document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

" stroke=\"#5a4632\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ spojMsg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:'Nunito',sans-serif; font-size:20px; font-weight:700; color:#c88a4a; text-align:center; animation:nudge .5s ease both;\">{{ spojMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ spojDone }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px; background:#fbf3e4; border:3px solid #ecd8a8; border-radius:26px; padding:22px 34px; animation:riseIn .5s ease both;\">\n              <svg width=\"72\" height=\"98\" viewBox=\"0 0 96 130\" style=\"animation:sprout 1s cubic-bezier(.34,1.4,.5,1) both; transform-origin:center bottom;\"><rect x=\"44.5\" y=\"52\" width=\"7\" height=\"72\" rx=\"3.5\" fill=\"#7fa86a\"><\u002Frect><ellipse cx=\"30\" cy=\"90\" rx=\"14\" ry=\"7\" fill=\"#8fbd76\" transform=\"rotate(28 30 90)\"><\u002Fellipse><ellipse cx=\"66\" cy=\"104\" rx=\"14\" ry=\"7\" fill=\"#8fbd76\" transform=\"rotate(-28 66 104)\"><\u002Fellipse><g transform=\"translate(48 34)\"><circle cx=\"0\" cy=\"-20\" r=\"15\" fill=\"#cbb8e8\"><\u002Fcircle><circle cx=\"19\" cy=\"-6\" r=\"15\" fill=\"#cbb8e8\"><\u002Fcircle><circle cx=\"12\" cy=\"16\" r=\"15\" fill=\"#cbb8e8\"><\u002Fcircle><circle cx=\"-12\" cy=\"16\" r=\"15\" fill=\"#cbb8e8\"><\u002Fcircle><circle cx=\"-19\" cy=\"-6\" r=\"15\" fill=\"#cbb8e8\"><\u002Fcircle><circle cx=\"0\" cy=\"-2\" r=\"11\" fill=\"#f6d17a\"><\u002Fcircle><\u002Fg><\u002Fsvg>\n              <div style=\"font-family:'Baloo 2',sans-serif; font-size:30px; font-weight:600; color:#5a8a4a; text-align:center;\">Výborně! Celá rodina slova ryba je pohromadě.<\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:14px; justify-content:center;\">\n                <button onclick=\"{{ goHub }}\" style=\"min-width:180px; min-height:70px; padding:0 34px; font-family:'Baloo 2',sans-serif; font-size:28px; font-weight:600; color:#7a6a45; background:#f6e6bf; border:3px solid #e6cfa6; border-radius:40px; cursor:pointer; transition:transform .3s ease;\" style-hover=\"transform:translateY(-3px)\">Další hra<\u002Fbutton>\n                <button onclick=\"{{ exitBuild }}\" style=\"min-width:180px; min-height:70px; padding:0 34px; font-family:'Baloo 2',sans-serif; font-size:28px; font-weight:600; color:#fff; background:#86bf67; border:none; border-radius:40px; box-shadow:0 14px 26px -12px rgba(90,120,50,.6); cursor:pointer; transition:transform .3s ease;\" style-hover=\"transform:translateY(-3px)\">Zpět do zahrady<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;demoTimers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Ukázka&quot;,&quot;label&quot;:&quot;Zrychlené časovače (8 s nečinnost, 25 s denní limit)&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'garden', locked: false, feedback: null, grown: 5, idleSleep: false, daySleep: false, celebMood: 'smile', bonusMs: 0, extensions: [], tick: 0, bView: 'hub', bFound: {}, bDone: {}, bloomCount: 0, bSkPre: null, bSkSuf: null, bSkKon: null, bSkMsg: null, bRozI: 0, bRozPick: [null, null, null, null], bRozOk: false, bRozWrong: false, bRozDone: false, bSpojSel: null, bSpojMatched: {}, bSpojDone: false, bSpojMsg: null };\n\n  startQuestion(next) {\n    clearTimeout(this._t);\n    this.setState({ screen: next, locked: true, feedback: null });\n    this._t = setTimeout(() => this.setState({ locked: false }), 3000);\n  }\n\n  componentDidMount() {\n    this._playStart = Date.now();\n    this._lastAct = Date.now();\n    this._onAct = () => { this._lastAct = Date.now(); if (this.state.idleSleep) this.setState({ idleSleep: false }); };\n    window.addEventListener('pointerdown', this._onAct, true);\n    this._tick = setInterval(() => this.checkSleep(), 1000);\n  }\n\n  checkSleep() {\n    const demo = this.props.demoTimers;\n    const idleMs = demo ? 8000 : 60000;\n    const baseDay = demo ? 25000 : 1800000;\n    const dayMs = baseDay + (this.state.bonusMs || 0);\n    const now = Date.now();\n    const idle = now - this._lastAct > idleMs;\n    if (idle !== this.state.idleSleep) this.setState({ idleSleep: idle });\n    if (now - this._playStart > dayMs) {\n      if (!this.state.daySleep) this.setState({ daySleep: true });\n      else this.setState({ tick: now });\n    }\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._t);\n    clearInterval(this._tick);\n    window.removeEventListener('pointerdown', this._onAct, true);\n  }\n\n  rozData() {\n    return [\n      { w: 'zahrádka',  chunks: [{ t: 'za', r: 'pre' }, { t: 'hrád', r: 'kor' }, { t: 'k', r: 'prip' }, { t: 'a', r: 'kon' }] },\n      { w: 'rozkvetlý', chunks: [{ t: 'roz', r: 'pre' }, { t: 'kvet', r: 'kor' }, { t: 'l', r: 'prip' }, { t: 'ý', r: 'kon' }] },\n      { w: 'podzemní',  chunks: [{ t: 'pod', r: 'pre' }, { t: 'zem', r: 'kor' }, { t: 'n', r: 'prip' }, { t: 'í', r: 'kon' }] },\n    ];\n  }\n  spData() {\n    return [\n      { id: 'ryba',   word: 'ryba',   pic: 'fish', parts: [{ t: 'ryb', r: 'kor' }, { t: 'a', r: 'kon' }] },\n      { id: 'rybnik', word: 'rybník', pic: 'pond', parts: [{ t: 'ryb', r: 'kor' }, { t: 'ník', r: 'prip' }] },\n      { id: 'rybar',  word: 'rybář',  pic: 'rod',  parts: [{ t: 'ryb', r: 'kor' }, { t: 'ář', r: 'prip' }] },\n    ];\n  }\n  openGame(v) {\n    const reset = { bView: v };\n    if (v === 'skladacka') Object.assign(reset, { bFound: {}, bSkPre: null, bSkSuf: null, bSkKon: null, bSkMsg: null });\n    if (v === 'rozbor') Object.assign(reset, { bRozI: 0, bRozPick: [null, null, null, null], bRozOk: false, bRozWrong: false, bRozDone: false });\n    if (v === 'spojovacka') Object.assign(reset, { bSpojSel: null, bSpojMatched: {}, bSpojMsg: null, bSpojDone: false });\n    this.setState(reset);\n  }\n  buildBack() {\n    if (this.state.bView === 'hub') this.setState({ screen: 'garden' });\n    else this.setState({ bView: 'hub' });\n  }\n  skladData() {\n    return {\n      pre: [{ id: 'vy', text: 'vý' }, { id: 'od', text: 'od' }, { id: 'pre', text: 'pře' }],\n      suf: [{ id: 'ec', text: 'ec' }, { id: 'adl', text: 'adl' }, { id: 'e', text: 'ě' }],\n      kon: [{ id: 'o', text: 'o' }, { id: 't', text: 't' }],\n      valid: [\n        { pre: 'vy',  suf: null,  kon: null, word: 'výlet',    parts: [{ t: 'vý', r: 'pre' }, { t: 'let', r: 'kor' }] },\n        { pre: 'od',  suf: null,  kon: null, word: 'odlet',    parts: [{ t: 'od', r: 'pre' }, { t: 'let', r: 'kor' }] },\n        { pre: 'pre', suf: null,  kon: null, word: 'přelet',   parts: [{ t: 'pře', r: 'pre' }, { t: 'let', r: 'kor' }] },\n        { pre: null,  suf: 'ec',  kon: null, word: 'letec',    parts: [{ t: 'let', r: 'kor' }, { t: 'ec', r: 'prip' }] },\n        { pre: null,  suf: 'adl', kon: 'o',  word: 'letadlo',  parts: [{ t: 'let', r: 'kor' }, { t: 'adl', r: 'prip' }, { t: 'o', r: 'kon' }] },\n        { pre: null,  suf: 'e',   kon: 't',  word: 'letět',    parts: [{ t: 'let', r: 'kor' }, { t: 'ě', r: 'prip' }, { t: 't', r: 'kon' }] },\n        { pre: 'od',  suf: 'e',   kon: 't',  word: 'odletět',  parts: [{ t: 'od', r: 'pre' }, { t: 'let', r: 'kor' }, { t: 'ě', r: 'prip' }, { t: 't', r: 'kon' }] },\n        { pre: 'pre', suf: 'e',   kon: 't',  word: 'přeletět', parts: [{ t: 'pře', r: 'pre' }, { t: 'let', r: 'kor' }, { t: 'ě', r: 'prip' }, { t: 't', r: 'kon' }] },\n      ],\n    };\n  }\n  pickSk(lane, id) {\n    const key = lane === 'pre' ? 'bSkPre' : lane === 'suf' ? 'bSkSuf' : 'bSkKon';\n    this.setState(st => ({ [key]: st[key] === id ? null : id, bSkMsg: null }));\n  }\n  clearSk(lane) {\n    const key = lane === 'pre' ? 'bSkPre' : lane === 'suf' ? 'bSkSuf' : 'bSkKon';\n    this.setState({ [key]: null, bSkMsg: null });\n  }\n  buildSk() {\n    const D = this.skladData();\n    const { bSkPre, bSkSuf, bSkKon } = this.state;\n    const m = D.valid.find(v => (v.pre || null) === (bSkPre || null) && (v.suf || null) === (bSkSuf || null) && (v.kon || null) === (bSkKon || null));\n    if (!m) { this.setState({ bSkMsg: 'no' }); return; }\n    if (this.state.bFound[m.word]) { this.setState({ bSkMsg: 'dup' }); return; }\n    this.setState(st => {\n      const nf = { ...st.bFound, [m.word]: true };\n      const cnt = Object.keys(nf).length;\n      const nd = cnt >= D.valid.length ? { ...st.bDone, skladacka: true } : st.bDone;\n      return { bFound: nf, bDone: nd, bloomCount: (st.bloomCount || 0) + 1, bSkPre: null, bSkSuf: null, bSkKon: null, bSkMsg: null };\n    });\n  }\n  rozTap(i) {\n    this.setState(st => {\n      if (st.bRozOk || st.bRozDone) return null;\n      const order = [null, 'pre', 'kor', 'prip', 'kon'];\n      const nx = order[(order.indexOf(st.bRozPick[i]) + 1) % 5];\n      const np = st.bRozPick.slice(); np[i] = nx;\n      return { bRozPick: np, bRozWrong: false };\n    });\n  }\n  rozCheck() {\n    const ROZ = this.rozData();\n    const cur = ROZ[this.state.bRozI];\n    const ok = cur.chunks.every((c, i) => this.state.bRozPick[i] === c.r);\n    if (ok) {\n      this.setState(st => {\n        const isLast = st.bRozI >= ROZ.length - 1;\n        const nd = isLast ? { ...st.bDone, rozbor: true } : st.bDone;\n        return { bRozOk: true, bRozWrong: false, bRozDone: isLast, bDone: nd, bloomCount: (st.bloomCount || 0) + 1 };\n      });\n    } else {\n      this.setState({ bRozWrong: true, bRozOk: false });\n    }\n  }\n  rozNext() {\n    this.setState(st => ({ bRozI: st.bRozI + 1, bRozPick: [null, null, null, null], bRozOk: false, bRozWrong: false }));\n  }\n  spojTapWord(id) {\n    if (this.state.bSpojMatched[id]) return;\n    this.setState({ bSpojSel: id, bSpojMsg: null });\n  }\n  spojTapPic(picId) {\n    const SP = this.spData();\n    const item = SP.find(x => x.pic === picId);\n    if (!item || this.state.bSpojMatched[item.id]) return;\n    const sel = this.state.bSpojSel;\n    if (!sel) { this.setState({ bSpojMsg: 'Nejdřív ťukni na slovo.' }); return; }\n    if (sel === item.id) {\n      this.setState(st => {\n        const nm = { ...st.bSpojMatched, [item.id]: true };\n        const all = Object.keys(nm).length >= SP.length;\n        const nd = all ? { ...st.bDone, spojovacka: true } : st.bDone;\n        return { bSpojMatched: nm, bSpojSel: null, bSpojMsg: null, bSpojDone: all, bDone: nd, bloomCount: (st.bloomCount || 0) + 1 };\n      });\n    } else {\n      this.setState({ bSpojMsg: 'To není ono, zkus jinou.' });\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const grown = s.grown;\n    const slots = Array.from({ length: 12 }, (_, i) => ({ full: i < grown, empty: i >= grown, i }));\n    const locked = s.locked;\n    const sleeping = s.idleSleep || s.daySleep;\n    const gardenOwlMood = sleeping ? 'sleepy' : 'normal';\n    const questionOwlMood = (s.screen === 'czech' && s.feedback === 'correct') ? s.celebMood : (sleeping ? 'sleepy' : 'normal');\n    const gardenBubble = s.daySleep\n      ? 'Dnes jsme si krásně hrály. Zahrada už spí — přijď zase zítra.'\n      : (s.idleSleep ? 'Psst… sova jen tak podřimuje. Ťukni, až budeš chtít.' : 'Ahoj! Zasadíme dnes další kytičky?');\n    const totalMs = Date.now() - (this._playStart || Date.now());\n    const dm = Math.floor(totalMs / 60000);\n    const ds = Math.floor((totalMs % 60000) / 1000);\n    const dailyTime = String(dm).padStart(2, '0') + ':' + String(ds).padStart(2, '0');\n    const extendLabel = this.props.demoTimers ? '15 sekund' : '15 minut';\n    // ---- Stavba slova (build mode) ----\n    const RM = {\n      pre:  { bg: '#ece0fb', bd: '#c9b3ef', fg: '#7a5bc0', label: 'PŘEDPONA' },\n      kor:  { bg: '#dcecd6', bd: '#a9cf95', fg: '#5f8a4a', label: 'KOŘEN' },\n      prip: { bg: '#fbe0eb', bd: '#f0b3cc', fg: '#c85f8b', label: 'PŘÍPONA' },\n      kon:  { bg: '#f7ecc9', bd: '#e8cf8f', fg: '#b9892b', label: 'KONCOVKA' },\n      none: { bg: '#f4ecd8', bd: '#e6d3a6', fg: '#b7a582', label: '?' },\n    };\n    const mkParts = arr => arr.map(p => ({ t: p.t, bg: RM[p.r].bg, bd: RM[p.r].bd, fg: RM[p.r].fg }));\n    const bView = s.bView || 'hub';\n    const bFound = s.bFound || {};\n    const bDone = s.bDone || {};\n\n    const SKD = this.skladData();\n    const bSkPre = s.bSkPre || null, bSkSuf = s.bSkSuf || null, bSkKon = s.bSkKon || null;\n    const skRing = (sel, c) => sel ? '0 0 0 4px ' + c : '0 5px 12px -7px rgba(90,70,40,.4)';\n    const preTiles = SKD.pre.map(t => ({ text: t.text, ring: skRing(bSkPre === t.id, '#d9c7f5'), tap: () => this.pickSk('pre', t.id) }));\n    const sufTiles = SKD.suf.map(t => ({ text: t.text, ring: skRing(bSkSuf === t.id, '#f7cfe0'), tap: () => this.pickSk('suf', t.id) }));\n    const konTiles = SKD.kon.map(t => ({ text: t.text, ring: skRing(bSkKon === t.id, '#efdfae'), tap: () => this.pickSk('kon', t.id) }));\n    const preTx = (SKD.pre.find(t => t.id === bSkPre) || {}).text;\n    const sufTx = (SKD.suf.find(t => t.id === bSkSuf) || {}).text;\n    const konTx = (SKD.kon.find(t => t.id === bSkKon) || {}).text;\n    const preSlot = { filled: !!bSkPre, empty: !bSkPre, text: preTx, clear: () => this.clearSk('pre') };\n    const sufSlot = { filled: !!bSkSuf, empty: !bSkSuf, text: sufTx, clear: () => this.clearSk('suf') };\n    const konSlot = { filled: !!bSkKon, empty: !bSkKon, text: konTx, clear: () => this.clearSk('kon') };\n    const foundWords = SKD.valid.filter(v => bFound[v.word]).map(v => ({ parts: mkParts(v.parts) }));\n    const skCount = foundWords.length;\n    const skladProgress = skCount + '/' + SKD.valid.length;\n    const skladDone = skCount >= SKD.valid.length;\n\n    const ROZ = this.rozData();\n    const bRozIdx = Math.min(s.bRozI || 0, ROZ.length - 1);\n    const curRoz = ROZ[bRozIdx];\n    const bRozPick = s.bRozPick || [null, null, null, null];\n    const rozChunks = curRoz.chunks.map((c, i) => {\n      const m = RM[bRozPick[i] || 'none'];\n      return { t: c.t, bg: m.bg, bd: m.bd, fg: m.fg, label: m.label, tap: () => this.rozTap(i) };\n    });\n    const rozDots = ROZ.map((_, i) => ({ color: i < (s.bRozI || 0) ? '#86bf67' : (i === (s.bRozI || 0) ? '#eaa93f' : '#e6d3a6') }));\n    const rozOk = !!s.bRozOk;\n    const rozIsLast = (s.bRozI || 0) >= ROZ.length - 1;\n\n    const SP = this.spData();\n    const bSpojMatched = s.bSpojMatched || {};\n    const bSpojSel = s.bSpojSel || null;\n    const spojWords = SP.map(w => {\n      const matched = !!bSpojMatched[w.id];\n      const sel = bSpojSel === w.id;\n      return {\n        parts: mkParts(w.parts), matched,\n        bg: matched ? '#e4f2dc' : (sel ? '#f3ebff' : '#fffdf5'),\n        bd: matched ? '#a9cf95' : (sel ? '#c9b3ef' : '#ecd8a8'),\n        shadow: sel ? '0 12px 24px -12px rgba(120,90,200,.5)' : '0 8px 18px -12px rgba(90,70,40,.35)',\n        cursor: matched ? 'default' : 'pointer',\n        tap: () => this.spojTapWord(w.id),\n      };\n    });\n    const SP_ORDER = ['pond', 'rod', 'fish'];\n    const spojPics = SP_ORDER.map(pt => {\n      const it = SP.find(x => x.pic === pt);\n      const matched = !!bSpojMatched[it.id];\n      return {\n        isFish: pt === 'fish', isPond: pt === 'pond', isRod: pt === 'rod',\n        bg: matched ? '#e4f2dc' : '#fffdf5', bd: matched ? '#a9cf95' : '#ecd8a8',\n        tap: () => this.spojTapPic(pt),\n      };\n    });\n\n    const hubCards = [\n      { title: 'Skládačka', desc: 'Skládej slova z jednoho kořene', isSklad: true, isRozbor: false, isSpoj: false, done: !!bDone.skladacka, open: () => this.openGame('skladacka') },\n      { title: 'Rozbor slova', desc: 'Urči předponu, kořen, příponu a koncovku', isSklad: false, isRozbor: true, isSpoj: false, done: !!bDone.rozbor, open: () => this.openGame('rozbor') },\n      { title: 'Spojovačka', desc: 'Přiřaď slovo k jeho obrázku', isSklad: false, isRozbor: false, isSpoj: true, done: !!bDone.spojovacka, open: () => this.openGame('spojovacka') },\n    ];\n    const buildTitle = bView === 'hub' ? 'Stavba slova' : (bView === 'skladacka' ? 'Skládačka' : (bView === 'rozbor' ? 'Rozbor slova' : 'Spojovačka'));\n\n    return {\n      gardenOwlMood, questionOwlMood, gardenBubble,\n      showDayPanel: s.daySleep, dailyTime, extensions: s.extensions, hasExtensions: s.extensions.length > 0, extendLabel,\n      isGarden: s.screen === 'garden',\n      isMath: s.screen === 'math',\n      isCzech: s.screen === 'czech',\n      isSummary: s.screen === 'summary',\n      isBuild: s.screen === 'build',\n      isHub: bView === 'hub', isSklad: bView === 'skladacka', isRozbor: bView === 'rozbor', isSpoj: bView === 'spojovacka',\n      buildTitle, backLabel: bView === 'hub' ? 'Zahrada' : 'Zpět',\n      hubOwlMood: sleeping ? 'sleepy' : 'cool', bloomCount: s.bloomCount || 0, hubCards,\n      buildBack: () => this.buildBack(), goHub: () => this.setState({ bView: 'hub' }),\n      preTiles, sufTiles, konTiles, preSlot, sufSlot, konSlot, buildSk: () => this.buildSk(),\n      skMsgNo: s.bSkMsg === 'no', skMsgDup: s.bSkMsg === 'dup',\n      foundWords, skladProgress, skladDone,\n      rozChunks, rozDots, rozWordLabel: curRoz.w, rozShowCheck: !rozOk, rozCheck: () => this.rozCheck(), rozNext: () => this.rozNext(),\n      rozOk, rozWrong: !!s.bRozWrong, rozIsLast, rozNotLast: !rozIsLast,\n      spojWords, spojPics, spojDone: !!s.bSpojDone, spojMsg: s.bSpojMsg || null,\n      goBuild: () => this.setState({ screen: 'build', bView: 'hub', bloomCount: 0, bFound: {}, bDone: {}, bRozI: 0, bRozPick: [null, null, null, null], bRozOk: false, bRozWrong: false, bRozDone: false, bSpojSel: null, bSpojMatched: {}, bSpojDone: false, bSpojMsg: null }),\n      exitBuild: () => this.setState({ screen: 'garden' }),\n      locked,\n      btnOpacity: locked ? 0.42 : 1,\n      btnScale: locked ? 0.95 : 1,\n      btnShadow: locked ? '0 2px 6px -4px rgba(90,70,40,.3)' : '0 16px 32px -14px rgba(90,70,40,.5)',\n      btnPointer: locked ? 'none' : 'auto',\n      owlAnim: locked ? 'owlThink 2.6s ease-in-out infinite' : 'owlBreathe 4.5s ease-in-out infinite',\n      hint: locked ? 'přemýšlej…' : 'Vyber, co ti přijde správné',\n      grownLabel: grown + '/12',\n      slots,\n      showButtons: s.feedback === null || s.feedback === 'wrong',\n      showPraise: s.feedback === 'correct',\n      showWrong: s.feedback === 'wrong',\n      goPlay: () => this.startQuestion('math'),\n      answerMath: () => { if (!this.state.locked) this.startQuestion('czech'); },\n      pickY: () => { if (!this.state.locked) { const pool = ['smile', 'smile', 'cool']; this.setState({ feedback: 'correct', grown: Math.min(12, this.state.grown + 1), celebMood: pool[Math.floor(Math.random() * pool.length)] }); } },\n      pickI: () => { if (!this.state.locked) this.setState({ feedback: 'wrong' }); },\n      goSummary: () => { clearTimeout(this._t); this.setState({ screen: 'summary' }); },\n      backToGarden: () => { clearTimeout(this._t); this.setState({ screen: 'garden', locked: false, feedback: null, grown: 5 }); },\n      extendDay: () => {\n        const demo = this.props.demoTimers;\n        const addMs = demo ? 15000 : 900000;\n        const label = demo ? '15 s' : '15 min';\n        const d = new Date();\n        const at = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');\n        this._lastAct = Date.now();\n        this.setState(st => ({ bonusMs: (st.bonusMs || 0) + addMs, daySleep: false, idleSleep: false, extensions: [...st.extensions, { label, at }] }));\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
