<title>Zahrada moudré sovy</title>
<style>
  /* ---------- base ---------- */
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  :root{
    --font: ui-rounded, 'SF Pro Rounded', 'Segoe UI', system-ui, -apple-system, Roboto, 'Helvetica Neue', Arial, sans-serif;
    --ink:#5a4632; --muted:#b09a6c; --muted2:#a8946a; --cream:#fffdf5;
    --border:#ecd8a8; --border2:#e6cfa6; --green:#86bf67; --green-ink:#5a8a4a;
  }
  html,body{height:100%; background:#f3ead0; font-family:var(--font); color:var(--ink);
    overscroll-behavior:none; -webkit-text-size-adjust:100%;}
  body{overflow:hidden;}
  button{font-family:var(--font); cursor:pointer;}
  #app{position:relative; width:100%; height:100vh; height:100dvh; min-height:560px; overflow:hidden;}
  .ver{position:absolute; left:16px; bottom:13px; z-index:60; font-size:13px; font-weight:700; letter-spacing:.5px; color:#bcaa84; pointer-events:none;}

  /* ---------- animations (ported from prototype) ---------- */
  @keyframes owlBreathe{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.03) translateY(-4px)}}
  @keyframes owlThink{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.06) rotate(-1.6deg)}}
  @keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes sprout{0%{opacity:0;transform:translateY(26px) scale(.15)}55%{opacity:1;transform:translateY(-6px) scale(1.12)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes pollen{0%{transform:translate(0,0);opacity:.4}50%{transform:translate(14px,-26px);opacity:.85}100%{transform:translate(0,0);opacity:.4}}
  @keyframes hintFade{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes btnWait{0%,100%{transform:scale(.965)}50%{transform:scale(.99)}}
  @keyframes glowSoft{0%,100%{opacity:.55}50%{opacity:.85}}
  @keyframes owlBlink{0%,90%,100%{transform:scaleY(0)}94%{transform:scaleY(1)}}
  @keyframes owlZzz{0%{transform:translateY(8px) scale(.6);opacity:0}25%{opacity:.9}100%{transform:translateY(-34px) scale(1.15);opacity:0}}
  @keyframes owlGlasses{0%{transform:translateY(-42px);opacity:0}70%{opacity:1}100%{transform:translateY(0);opacity:1}}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; animation-iteration-count:1 !important;} }

  /* ---------- owl ---------- */
  .owl{display:block; width:100%; height:100%;}
  .owl svg{display:block; overflow:visible; width:100%; height:100%;}
  .owl .m-open{display:block}
  .owl .m-sleepy,.owl .m-smile,.owl .m-cool{display:none}
  .owl[data-mood="sleepy"] .m-open{display:none}
  .owl[data-mood="sleepy"] .m-sleepy{display:block}
  .owl[data-mood="smile"] .m-smile{display:block}
  .owl[data-mood="cool"] .m-cool{display:block}
  .owl-lid{transform-box:fill-box; transform-origin:center top; animation:owlBlink 5.5s ease-in-out infinite;}
  .owl-zzz{animation:owlZzz 3.6s ease-in-out infinite;}
  .owl-zzz.z2{animation-delay:1.2s;} .owl-zzz.z3{animation-delay:2.4s;}
  .owl-cool-g{animation:owlGlasses 1.5s cubic-bezier(.34,1.3,.6,1) both;}

  /* ---------- screens ---------- */
  .screen{position:absolute; inset:0; transition:filter .7s ease;}
  /* wait-lock: the whole screen calmly greys out — "nespěchej, ještě neklikej" */
  .screen.waiting{filter:grayscale(.72) brightness(.95);}
  .rise{animation:riseIn .6s ease both;}

  /* garden / summary shared bg pieces */
  .meadow{position:absolute; left:-10%; right:-10%; bottom:0; height:46%;
    background:linear-gradient(180deg,#c6dda2 0%,#a9cc84 100%);
    border-radius:46% 54% 0 0 / 22% 20% 0 0;}
  .pollen{position:absolute; border-radius:50%; filter:blur(1px);}

  /* gear */
  .gear{position:absolute; top:22px; right:22px; width:56px; height:56px; display:flex;
    align-items:center; justify-content:center; background:var(--cream); border:3px solid var(--border);
    border-radius:50%; z-index:40; box-shadow:0 8px 18px -10px rgba(90,70,40,.4); transition:transform .4s ease;}
  .gear:hover{transform:rotate(40deg);}

  /* speech bubble */
  .bubble{position:relative; background:var(--cream); border:3px solid var(--border); border-radius:28px;
    padding:20px 32px; max-width:560px; box-shadow:0 14px 34px -16px rgba(90,70,40,.42);
    font-size:clamp(22px,3.4vmin,30px); font-weight:600; text-align:center; line-height:1.28;}
  .bubble .tail{position:absolute; left:50%; bottom:-13px; width:24px; height:24px; background:var(--cream);
    border-right:3px solid var(--border); border-bottom:3px solid var(--border);
    transform:translateX(-50%) rotate(45deg); border-radius:0 0 7px 0;}

  /* big green button */
  .cta{min-width:230px; min-height:88px; padding:0 56px; font-size:clamp(30px,4.6vmin,44px);
    font-weight:800; color:#fff; background:var(--green); border:none; border-radius:46px;
    box-shadow:0 16px 30px -12px rgba(90,120,50,.6); transition:transform .3s ease, box-shadow .3s ease;}
  .cta:hover{transform:translateY(-4px); box-shadow:0 24px 38px -12px rgba(90,120,50,.62);}
  .cta:active{transform:translateY(-1px);}
  .cta.small{min-width:200px; min-height:74px; padding:0 44px; font-size:clamp(26px,3.6vmin,34px);}

  /* day info panel */
  .daypanel{margin-top:16px; display:flex; flex-direction:column; align-items:center; gap:12px;
    background:var(--cream); border:3px solid var(--border2); border-radius:28px; padding:18px 30px 20px;
    width:min(420px,92vw); box-shadow:0 18px 38px -18px rgba(90,70,40,.42);}
  .daypanel .lbl{font-size:14px; font-weight:800; color:#b7a582; letter-spacing:1px;}
  .daypanel .big{font-size:44px; font-weight:800; line-height:1;}
  .daypanel .sub{font-size:15px; font-weight:700; color:#c2b087;}

  /* question area */
  .qwrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; padding:6px 18px 30px; min-height:0;}
  .qbig{font-size:clamp(52px,10vmin,116px); font-weight:800; line-height:1; text-align:center;}
  .gap{display:inline-flex; align-items:center; justify-content:center; min-width:.7em; height:.9em;
    margin:0 .06em; background:rgba(246,213,130,.42); border:4px dashed #e8c877; border-radius:16px; vertical-align:middle;}
  /* chosen answer dropped into the question/formula after a pick */
  .gapfill{display:inline-flex; align-items:center; justify-content:center; min-width:.7em;
    margin:0 .06em; padding:0 .12em; border-radius:16px; vertical-align:middle; font-weight:800;
    animation:riseIn .35s ease both;}
  .gapfill.ok{color:var(--green-ink); background:rgba(134,191,103,.22);}
  .gapfill.no{color:#c47b62; background:rgba(196,123,98,.18);}
  .qsentence{font-size:clamp(20px,3.4vmin,30px); font-weight:600; color:var(--muted2); text-align:center; max-width:680px; line-height:1.35;}
  .qsentence b{color:var(--ink); letter-spacing:.02em;}
  /* sentence-focused (Věty) layout */
  .qsent{font-size:clamp(30px,5.6vmin,56px); font-weight:800; color:var(--ink); text-align:center; max-width:900px; line-height:1.32;}
  .wgap{display:inline-flex; align-items:baseline; white-space:nowrap;}

  .qrow{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:28px 52px; width:100%; max-width:940px;}
  .owlcol{display:flex; flex-direction:column; align-items:center; gap:12px; width:186px;}
  .owlbox{width:168px; height:178px; transform-origin:center bottom; animation:owlBreathe 4.5s ease-in-out infinite;}
  .owlbox.think{animation:owlThink 2.6s ease-in-out infinite;}
  .hint{font-size:24px; font-weight:600; color:var(--muted); text-align:center; animation:hintFade 3.2s ease-in-out infinite;}

  /* answer buttons */
  .mgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:20px;}
  .abtn{min-width:180px; min-height:96px; padding:0 26px; font-size:clamp(34px,6vmin,52px); font-weight:800;
    color:var(--ink); background:var(--cream); border:3px solid var(--border); border-radius:32px;
    box-shadow:0 16px 32px -14px rgba(90,70,40,.5); transition:opacity 1.1s ease, transform .28s ease, box-shadow 1.1s ease;}
  .abtn:hover{transform:translateY(-5px);}
  .abtn:active{transform:translateY(-1px);}
  .iyrow{display:flex; gap:26px;}
  .iybtn{min-width:140px; min-height:118px; font-size:clamp(48px,9vmin,74px); font-weight:800;
    color:var(--ink); background:var(--cream); border:3px solid var(--border); border-radius:34px;
    box-shadow:0 16px 32px -14px rgba(90,70,40,.5); transition:opacity 1.1s ease, transform .28s ease, box-shadow 1.1s ease;}
  .iybtn:hover{transform:translateY(-5px);}
  .iybtn:active{transform:translateY(-1px);}
  /* locked state (wait-lock): unmistakably "not yet — thinking", with a calm breathing cue */
  .answers.locked .abtn,.answers.locked .iybtn{
    color:#b7a988; background:#ece3cd; border-color:#ddd0ac; border-style:dashed;
    box-shadow:0 2px 6px -4px rgba(90,70,40,.22);
    cursor:not-allowed; pointer-events:none;
    animation:btnWait 2.6s ease-in-out infinite;}
  .answers.locked .abtn:hover,.answers.locked .iybtn:hover,
  .answers.locked .abtn:active,.answers.locked .iybtn:active{transform:none;}
  /* gentle offset so the pair breathes like a soft wave, never in urgent unison */
  .answers.locked .mgrid .abtn:nth-child(2n),
  .answers.locked .iyrow .iybtn:nth-child(2){animation-delay:.9s;}

  /* praise + wrong */
  .praise{display:flex; flex-direction:column; align-items:center; gap:18px; animation:riseIn .5s ease both;}
  .praise .msg{font-size:clamp(26px,4vmin,34px); font-weight:800; color:var(--green-ink); text-align:center;}
  .wrongcard{display:flex; flex-direction:column; align-items:center; gap:10px; max-width:680px;
    background:#fbf3e4; border:3px solid var(--border); border-radius:26px; padding:20px 30px;
    animation:riseIn .5s ease both;}
  .wrongcard .t{font-size:clamp(24px,3.6vmin,30px); font-weight:800; color:#8a7350; text-align:center;}
  .wrongcard .e{font-size:clamp(17px,2.6vmin,20px); font-weight:600; color:var(--muted2); text-align:center; line-height:1.45;}
  .wrongcard .e b{color:#8a7350;}
  .explainnote{font-size:clamp(17px,2.6vmin,20px); font-weight:700; color:#8a7350; text-align:center; max-width:560px; line-height:1.4;}
  /* answer recall on result screens */
  .pickline{font-size:clamp(17px,2.6vmin,21px); font-weight:700; color:var(--muted2); text-align:center; line-height:1.5;}
  .pick-mine{color:#c47b62; font-weight:800;}
  .pick-right{color:var(--green-ink); font-weight:800;}

  /* overlay (parent + gate + confirm) */
  .overlay{position:absolute; inset:0; z-index:80; display:flex; align-items:center; justify-content:center;
    padding:20px; background:rgba(70,55,35,.34); animation:riseIn .3s ease both; overflow-y:auto;}
  .card{background:var(--cream); border:3px solid var(--border2); border-radius:30px; padding:26px 28px;
    width:min(560px,94vw); box-shadow:0 26px 60px -20px rgba(70,55,40,.5); max-height:94vh; overflow-y:auto;}
  .card h2{font-size:28px; font-weight:800; text-align:center; margin-bottom:4px;}
  .card .lead{font-size:16px; font-weight:600; color:var(--muted2); text-align:center; margin-bottom:18px;}
  .setblock{margin:16px 0; padding:16px 16px; border:2px solid #f0e3c4; border-radius:20px;}
  .setblock .st{font-size:14px; font-weight:800; letter-spacing:1px; color:#b7a582; margin-bottom:12px;}
  .chips{display:flex; flex-wrap:wrap; gap:10px;}
  .chip{min-width:52px; min-height:52px; padding:0 14px; display:inline-flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:800; color:var(--muted2); background:#f6efdd; border:2.5px solid var(--border);
    border-radius:16px; transition:transform .15s ease;}
  .chip[aria-pressed="true"]{color:#fff; background:var(--green); border-color:var(--green);}
  .chip:active{transform:scale(.94);}
  .seg{display:flex; gap:10px;}
  .seg .chip{min-width:66px;}
  .toggle{display:flex; align-items:center; justify-content:space-between; gap:14px;}
  .toggle .lab{font-size:18px; font-weight:700; color:var(--ink);}
  .switch{width:74px; height:44px; border-radius:24px; background:#e4d6b2; border:none; position:relative; transition:background .25s ease; flex:0 0 auto;}
  .switch[aria-pressed="true"]{background:var(--green);}
  .switch::after{content:""; position:absolute; top:5px; left:5px; width:34px; height:34px; border-radius:50%;
    background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.2); transition:transform .25s ease;}
  .switch[aria-pressed="true"]::after{transform:translateX(30px);}
  .rowbtns{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:18px;}
  .btn2{min-height:56px; padding:0 26px; font-size:19px; font-weight:800; border-radius:30px; border:3px solid var(--border2);
    background:#f6e6bf; color:#7a6a45; transition:transform .2s ease, background .2s ease;}
  .btn2:hover{transform:translateY(-2px); background:#f2dea8;}
  .btn2.ghost{background:var(--cream);}
  .btn2.danger{background:#f6dcd2; border-color:#e6b6a6; color:#a5644f;}
  .btn2.go{background:var(--green); border-color:var(--green); color:#fff;}
  .gatePad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px auto 6px; max-width:260px;}
  .gatePad button{min-height:56px; font-size:24px; font-weight:800; border-radius:16px; border:2.5px solid var(--border);
    background:#f6efdd; color:var(--ink);}
  .gateDisp{font-size:34px; font-weight:800; text-align:center; letter-spacing:2px; min-height:44px; color:var(--ink);}
  .gateMsg{text-align:center; font-size:15px; font-weight:700; color:#c08a6a; min-height:20px;}
  .center{display:flex; flex-direction:column; align-items:center;}

  /* ---------- setup screen (levels/modes) ---------- */
  .setupscroll{position:absolute; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:safe center; gap:16px; padding:26px 18px; overflow-y:auto;}
  .setuptitle{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .setrow{display:flex; gap:18px; flex-wrap:wrap; justify-content:center; width:100%; max-width:840px;}
  .tcard{flex:1 1 330px; max-width:400px; background:var(--cream); border:3px solid var(--border); border-radius:26px; padding:18px 20px 20px; box-shadow:0 16px 34px -18px rgba(90,70,40,.42); display:flex; flex-direction:column; gap:14px; transition:opacity .25s ease;}
  .tcard.off{opacity:.45;}
  .tcard .th{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .tcard .tt{font-size:23px; font-weight:800; display:flex; align-items:center; gap:8px;}
  .tcard .tt .ic{font-size:26px;}
  .readout{font-size:21px; font-weight:800; color:var(--green-ink); text-align:center; min-height:26px;}
  .readout small{display:block; font-size:14px; font-weight:700; color:#b7a582; margin-top:2px;}
  .slabels{display:flex; justify-content:space-between; font-size:13px; font-weight:800; color:#c2b087; letter-spacing:.5px; margin-top:-4px;}
  .slider{-webkit-appearance:none; appearance:none; width:100%; height:16px; border-radius:12px; background:#efe4c4; border:2px solid var(--border2); outline:none; margin:8px 0;}
  .slider::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:46px; height:46px; border-radius:50%; background:var(--green); border:5px solid var(--cream); box-shadow:0 5px 12px -4px rgba(90,120,50,.7); cursor:pointer;}
  .slider::-moz-range-thumb{width:44px; height:44px; border-radius:50%; background:var(--green); border:5px solid var(--cream); box-shadow:0 5px 12px -4px rgba(90,120,50,.7); cursor:pointer;}
  .slider:disabled{opacity:.5;}
  .formseg{display:flex; gap:0; border:2.5px solid var(--border); border-radius:18px; overflow:hidden;}
  .formseg button{flex:1; min-height:52px; font-size:19px; font-weight:800; border:none; background:#f6efdd; color:var(--muted2); cursor:pointer;}
  .formseg button[aria-pressed="true"]{background:var(--green); color:#fff;}
  .tcard.off .slider,.tcard.off .formseg{pointer-events:none;}
  .setupwarn{font-size:15px; font-weight:800; color:#a5644f; text-align:center;}

  /* ---------- stavba slova (build mode) ---------- */
  @keyframes nudge{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes tilePop{0%{opacity:0;transform:translateY(10px) scale(.7)}60%{opacity:1;transform:translateY(-3px) scale(1.08)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .cta.build{display:inline-flex; align-items:center; justify-content:center; gap:12px;
    background:#a98fd8; box-shadow:0 16px 30px -12px rgba(120,90,190,.55);}
  .cta.build:hover{box-shadow:0 24px 38px -12px rgba(120,90,190,.6);}
  .bhead{width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px 4px; flex-wrap:wrap;}
  .bback{display:inline-flex; align-items:center; gap:6px; min-height:52px; padding:0 20px; font-size:21px; font-weight:800;
    color:#7a6a45; background:var(--cream); border:3px solid var(--border); border-radius:30px; transition:transform .3s ease;}
  .bback:hover{transform:translateX(-3px);}
  .btitle{font-size:clamp(24px,3.4vmin,32px); font-weight:800;}
  .bchip{display:flex; align-items:center; gap:7px; min-height:52px; padding:0 16px; background:var(--cream);
    border:3px solid var(--border); border-radius:30px; font-size:21px; font-weight:800; color:var(--green-ink);}
  .legend{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:4px 18px;}
  .lgd{display:flex; align-items:center; gap:7px; padding:5px 13px; border-radius:22px; border:2px solid; font-size:14px; font-weight:800;}
  .lgd .dot{width:11px; height:11px; border-radius:50%; background:currentColor;}
  /* morpheme role colors (shared by legend, slots, tiles, chunks, word parts) */
  .r-pre{color:#7a5bc0; background:#ece0fb; border-color:#c9b3ef;}
  .r-kor{color:#5f8a4a; background:#dcecd6; border-color:#a9cf95;}
  .r-prip{color:#c85f8b; background:#fbe0eb; border-color:#f0b3cc;}
  .r-kon{color:#b9892b; background:#f7ecc9; border-color:#e8cf8f;}
  .r-none{color:#b7a582; background:#f4ecd8; border-color:#e6d3a6;}
  .bwrap{flex:1; display:flex; flex-direction:column; align-items:center; gap:14px; padding:8px 18px 44px; overflow-y:auto; min-height:0;}
  .bnote{font-size:clamp(19px,2.8vmin,25px); font-weight:600; color:#8a7350; text-align:center; max-width:640px; line-height:1.32;}
  .bcards{display:flex; flex-wrap:wrap; gap:20px; justify-content:center;}
  .bcard{position:relative; width:250px; display:flex; flex-direction:column; align-items:center; gap:10px; padding:24px 20px 22px;
    background:var(--cream); border:3px solid var(--border); border-radius:28px; box-shadow:0 16px 34px -20px rgba(90,70,40,.5);
    transition:transform .3s ease, box-shadow .3s ease;}
  .bcard:hover{transform:translateY(-5px); box-shadow:0 26px 44px -20px rgba(90,70,40,.5);}
  .bcard .bt{font-size:25px; font-weight:800; color:var(--ink);}
  .bcard .bd{font-size:15px; font-weight:600; color:var(--muted2); text-align:center; line-height:1.35;}
  .bcard .donebadge{position:absolute; top:12px; right:13px; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    background:var(--green); border-radius:50%;}
  /* skládačka */
  .sklane{display:flex; align-items:flex-start; gap:8px; flex-wrap:wrap; justify-content:center;}
  .skcol{display:flex; flex-direction:column; align-items:center; gap:5px;}
  .cl{font-size:12px; font-weight:800; letter-spacing:.5px;}
  .skslot{min-width:74px; min-height:70px; display:flex; align-items:center; justify-content:center; padding:6px 14px;
    font-size:clamp(28px,5vmin,44px); font-weight:800; border:4px solid; border-radius:18px; font-family:var(--font);}
  .skslot.empty{border-style:dashed; font-size:28px; opacity:.8;}
  .skslot.want{animation:hintFade 1.6s ease-in-out infinite;}
  .lanetiles{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:210px; margin-top:6px;}
  .tile{min-width:74px; min-height:58px; padding:0 14px; font-size:26px; font-weight:800; border:3px solid; border-radius:16px;
    box-shadow:0 5px 12px -7px rgba(90,70,40,.4); transition:transform .2s ease, box-shadow .2s ease;}
  .tile:hover{transform:translateY(-3px);}
  .tile.sel{box-shadow:0 0 0 4px rgba(90,70,40,.22);}
  .tile.want{animation:hintFade 1.4s ease-in-out infinite; box-shadow:0 0 0 5px rgba(234,169,63,.55);}
  .bmsg{font-size:19px; font-weight:700; color:#c88a4a; text-align:center; max-width:560px; line-height:1.4;}
  .bmsg.good{color:var(--green-ink);}
  .bmsg.mut{color:var(--muted2);}
  .nudge{animation:nudge .5s ease both;}
  .foundwrap{width:min(760px,96%); display:flex; flex-direction:column; gap:8px; align-items:center;}
  .fword{display:flex; align-items:center; gap:8px; padding:7px 13px; background:var(--cream); border:3px solid var(--border);
    border-radius:20px; animation:tilePop .4s cubic-bezier(.34,1.4,.5,1) both;}
  .mpart{font-size:23px; font-weight:800; padding:2px 8px; margin:0 1px; border-radius:9px; border:2px solid;}
  .hintbtn{display:inline-flex; align-items:center; gap:8px; min-height:54px; padding:0 22px; font-size:19px; font-weight:800;
    color:#7a6a45; background:#f6e6bf; border:3px solid var(--border2); border-radius:30px; transition:transform .2s ease;}
  .hintbtn:hover{transform:translateY(-2px);}
  .hintbtn:disabled{opacity:.55; cursor:default; transform:none;}
  .hintbtn.waiting{animation:hintFade 2.4s ease-in-out infinite;}
  .skpreview{display:flex; align-items:center; gap:1px; min-height:56px; padding:6px 22px; border-radius:20px;
    background:#fffaf0; border:3px dashed var(--border2); font-family:var(--font);}
  .skpreview .seg{font-size:clamp(30px,5vmin,46px); font-weight:800; line-height:1;}
  .skpreview .seg.dim{color:#c9b48a;}
  .skpvlbl{font-size:12px; font-weight:800; letter-spacing:.5px; color:var(--muted2);}
  /* rozbor */
  .rozpal{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; padding:2px 12px;}
  .pchip{display:inline-flex; align-items:center; gap:8px; min-height:52px; padding:8px 18px; border-radius:26px; border:3px solid;
    font-size:clamp(15px,2.4vmin,19px); font-weight:800; transition:transform .15s ease, box-shadow .2s ease; font-family:var(--font);}
  .pchip .pdot{width:20px; height:20px; border-radius:50%; border:2px solid rgba(90,70,40,.18);}
  .pchip.on{transform:translateY(-2px); box-shadow:0 0 0 4px rgba(90,70,40,.18);}
  .rozdots{display:flex; gap:10px;}
  .rozdots span{width:14px; height:14px; border-radius:50%;}
  .rozrow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; align-items:flex-start;}
  .rozbit{display:flex; flex-direction:column; align-items:center; gap:7px; padding:4px 2px; background:none; border:none;}
  .rozbit .ch{min-width:62px; padding:10px 16px; text-align:center; font-size:clamp(34px,6vmin,54px); font-weight:800;
    border-radius:18px; border:4px solid; transition:all .2s ease; font-family:var(--font);}
  /* spojovačka */
  .spwrap{position:relative; display:flex; gap:clamp(24px,8vw,110px); align-items:center; justify-content:center; flex-wrap:wrap;}
  .spvines{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; z-index:1;}
  .spvines path{fill:none; stroke:#8fbd76; stroke-width:5; stroke-linecap:round; opacity:.85;
    stroke-dasharray:600; stroke-dashoffset:600; animation:vineGrow .55s ease forwards;}
  .spvines circle{fill:#e79ab5; opacity:0; animation:vineLeaf .4s ease .4s forwards;}
  @keyframes vineGrow{to{stroke-dashoffset:0;}}
  @keyframes vineLeaf{to{opacity:.9;}}
  .spcol{display:flex; flex-direction:column; gap:14px;}
  .spword{display:flex; align-items:center; gap:8px; min-width:200px; min-height:60px; padding:10px 16px; border-radius:22px;
    background:var(--cream); border:3px solid var(--border); box-shadow:0 8px 18px -12px rgba(90,70,40,.35); transition:transform .25s ease;
    touch-action:none; user-select:none; -webkit-user-select:none; cursor:grab;}
  .spword:hover{transform:translateX(4px);}
  .spword.dragsrc{opacity:.35;}
  .spghost{position:fixed; z-index:99; pointer-events:none; opacity:.95; transition:none;
    box-shadow:0 18px 34px -14px rgba(90,70,40,.5);}
  .sppic.dropok{transform:scale(1.1); border-color:#eaa93f; background:#fdf3d8;}
  .spword.sel{background:#f3ebff; border-color:#c9b3ef; box-shadow:0 12px 24px -12px rgba(120,90,200,.5);}
  .spword.hit{background:#e4f2dc; border-color:#a9cf95; cursor:default;}
  .sppic{width:112px; height:112px; display:flex; align-items:center; justify-content:center; border-radius:24px;
    background:var(--cream); border:3px solid var(--border); transition:transform .25s ease;}
  .sppic:hover{transform:scale(1.05);}
  .sppic.hit{background:#e4f2dc; border-color:#a9cf95;}
  .spemoji{font-size:60px; line-height:1;}
  .spfam{font-size:clamp(15px,2.4vmin,18px); font-weight:700; color:var(--muted2); text-align:center; max-width:600px; line-height:1.4;}
  .spfam b{color:#5f8a4a;}
  .bpanel{display:flex; flex-direction:column; align-items:center; gap:14px; background:#fbf3e4; border:3px solid var(--border);
    border-radius:26px; padding:20px 30px; animation:riseIn .5s ease both; max-width:min(640px,94vw);}
  .bpanel .pt{font-size:27px; font-weight:800; color:var(--green-ink); text-align:center;}

  /* ---------- shared flower-counting top bar (all modes) ---------- */
  .tbfix{position:absolute; top:0; left:0; right:0; z-index:50;}
  .topbar{flex:0 0 auto; width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px 16px;
    padding:9px 18px; background:rgba(255,253,245,.9); border-bottom:2px solid var(--border); flex-wrap:wrap;}
  .tb-louka{display:flex; align-items:center; gap:8px;}
  .tb-louka-txt{display:flex; flex-direction:column; line-height:1.05;}
  .tb-lbl{font-size:11px; font-weight:800; letter-spacing:.8px; color:#b7a582;}
  .tb-kyt{font-size:19px; font-weight:800; color:var(--ink);}
  .tb-chips{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;}
  .tb-chip{display:flex; align-items:center; gap:5px; padding:4px 12px 4px 8px; border:2px solid; border-radius:22px;}
  .tb-chip span{font-size:19px; font-weight:800;}
  .tb-osl{display:flex; align-items:center; gap:9px;}
  .tb-osl-lbl{font-size:11px; font-weight:800; letter-spacing:.8px; color:#b7a582;}
  .tb-bar{position:relative; width:104px; height:14px; background:#f0e3c4; border:1px solid #e6d3a6; border-radius:8px; overflow:hidden;}
  .tb-fill{position:absolute; top:0; left:0; bottom:0; background:linear-gradient(90deg,#f3c53f,#86bf67); border-radius:8px; transition:width .5s cubic-bezier(.34,1.2,.64,1);}
  .tb-osl-num{font-size:16px; font-weight:800; color:#7a6a45; min-width:44px; text-align:right;}
  @media (max-width:600px){ .tb-lbl,.tb-osl-lbl{display:none;} .tb-bar{width:70px;} .tb-kyt{font-size:17px;} }

  /* ---------- slovní druhy ---------- */
  .cta.druhy{display:inline-flex; align-items:center; justify-content:center; gap:12px;
    background:#e0917c; box-shadow:0 16px 30px -12px rgba(190,110,80,.5);}
  .cta.druhy:hover{box-shadow:0 24px 38px -12px rgba(190,110,80,.58);}
  .druhy-dots{display:flex; gap:8px; justify-content:center; padding:2px 12px 6px; flex-wrap:wrap;}
  .druhy-dot{width:12px; height:12px; border-radius:50%;}
  .druhy-play{flex:1; display:flex; flex-direction:column; align-items:center; gap:16px; padding:8px 16px 34px; overflow-y:auto; min-height:0;}
  .druhy-top{display:flex; align-items:center; justify-content:center; gap:22px; flex-wrap:wrap;}
  .druhy-owl{width:96px; height:100px; transform-origin:center bottom; animation:owlBreathe 4.5s ease-in-out infinite;}

  .druhy-wordcol{display:flex; flex-direction:column; align-items:center; gap:7px;}

  .druhy-hint{font-size:clamp(16px,2.6vmin,20px); font-weight:700; color:var(--muted); text-align:center; min-height:24px; animation:hintFade 3.2s ease-in-out infinite;}
  .druhy-beds{display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,168px)); gap:11px; justify-content:center; width:min(920px,100%);}
  .druhy-beds.locked{opacity:.9;}
  .druhy-bed{display:flex; flex-direction:column; align-items:center; gap:3px; padding:11px 9px 9px; border:3px solid; border-radius:20px;
    cursor:pointer; transition:transform .2s ease, box-shadow .2s ease;}
  .druhy-bed:hover{transform:translateY(-3px);}

/* ---------------- math ---------------- */
function factKey(a,b){ var lo=Math.min(a,b), hi=Math.max(a,b); return lo+'x'+hi; }
function factStat(k){ return DB.facts[k]||{seen:0,correct:0,wrong:0}; }
function pickMathFact(avoidKey){
  var cands=[],a,b;
  var maxF=(DB.settings.setup&&DB.settings.setup.maxFactor)||10;
  var allowed=DB.settings.activeTables;
  var tables=allowed.filter(function(t){ return t<=maxF; });
  if(!tables.length) tables=allowed;   // parent allow-list wins if slider excludes all
  var bMax=Math.min(10,maxF);
  for(var ti=0;ti<tables.length;ti++){ a=tables[ti];
    for(b=1;b<=bMax;b++){
      var k=factKey(a,b); if(k===avoidKey) continue;
      var st=factStat(k); var w=1;
      if(a===6||a===7||a===8||a===9) w*=2;
      var att=st.correct+st.wrong; var err=att? st.wrong/att : 0;
      w*= 1+2*err; if(att===0) w*=1.3;
      cands.push({a:a,b:b,key:k,w:w});
    }
  }
  if(!cands.length) return {a:1,b:1,key:'1x1',w:1};
  return weightedPick(cands);
}
function mathAnswers(a,b){
  var correct=a*b; var set={}; var out=[];
  function add(v){ if(v>0 && v!==correct && !set[v]){ set[v]=1; out.push(v); } }
  add(correct+a); add(correct-a); add(correct+b); add(correct-b);
  add(a*(b+1)); add(a*(b-1)); add((a+1)*b); add((a-1)*b);
  if(correct>=10){ var rev=parseInt((''+correct).split('').reverse().join(''),10); add(rev); }
  add(correct+1); add(correct-1); add(correct+2); add(correct-2);
  shuffle(out);
  var picks=out.slice(0,3);
  var n=1;
  while(picks.length<3){ var cand=correct+n; if(cand>0 && cand!==correct && picks.indexOf(cand)<0) picks.push(cand); n=(n>0?-n:(-n+1)); }
  return shuffle([correct].concat(picks));
}

// gaps that render identically for >1 word (homophones) need context even in "Slova" mode
var AMBIG={};
(function(){ var seen={}; var i,g;
  for(i=0;i<BANK.length;i++){ g=BANK[i].row+':'+BANK[i].pre+'_'+BANK[i].post; seen[g]=(seen[g]||0)+1; }
  for(i=0;i<BANK.length;i++){ g=BANK[i].row+':'+BANK[i].pre+'_'+BANK[i].post; if(seen[g]>1) AMBIG[BANK[i].id]=true; }
})();
function needsContext(w){ return !!AMBIG[w.id]; }
function wordStat(id){ return DB.words[id]||{seen:0,correct:0,wrong:0}; }
function optionsFor(ans){ return (ans==='í'||ans==='ý')? ['í','ý'] : ['i','y']; }
function pickWord(avoidId){
  var rows=DB.settings.activeRows;
  var maxLvl=(DB.settings.setup&&DB.settings.setup.czechLevel)||3;
  function build(lvlCap){
    var out=[];
    for(var i=0;i<BANK.length;i++){ var w=BANK[i];
      if(rows.indexOf(w.row)<0) continue; if(w.level>lvlCap) continue; if(w.id===avoidId) continue;
      var st=wordStat(w.id); var att=st.correct+st.wrong; var err=att? st.wrong/att : 0;
      var wt=1+2*err; if(att===0) wt*=1.3;
      out.push({w:w, weight:wt});
    }
    return out;
  }
  var cands=build(maxLvl);
  if(!cands.length) cands=build(3);        // level too low for active rows -> relax
  if(!cands.length) return null;
  // weightedPick expects .w
  var mapped=cands.map(function(c){ return {w:c.weight, item:c.w}; });
  return weightedPick(mapped).item;
}

/* ---------------- stavba slova — rozbor bank ---------------- */
// R('chunk:role chunk:role ...', level, řada, rodina, emoji, svg) — roles: pre/kor/prip/kon.
// Slovesa: kmenová samohláska jako přípona, -t jako koncovka (letět = let:kor ě:prip t:kon).
// Obrázek pro spojovačku: svg (klíč do PIC_SVG) má přednost, jinak emoji; prázdné obojí = slovo
// se ve spojovačce nepoužije.
function R(seg,level,row,fam,emoji,svg){
  var chunks=seg.split(' ').map(function(p){ var q=p.split(':'); return {t:q[0], r:q[1]}; });
  var w=chunks.map(function(c){ return c.t; }).join('');
  return {id:'roz:'+w, w:w, chunks:chunks, level:level, row:row||null, fam:fam, emoji:emoji||null, svg:svg||null};
}

(function(){ // self-check: složení částí = slovo, právě jeden kořen, pořadí pre<kor<prip<kon

    for(var j=0;j<e.chunks.length;j++){ var c=e.chunks[j];
      if(!ORD[c.r] || ORD[c.r]<=last) console.warn('ROZBOR_BANK: špatné pořadí částí u', e.w);
      last=ORD[c.r]; if(c.r==='kor') kor++;
    }
    if(kor!==1) console.warn('ROZBOR_BANK: slovo bez (či s více) kořenů:', e.w);
  }
})();
function rozborFamilies(){ // rodina -> {fam, kkorVarianty, slova[]} (pro skládačku/spojovačku)
  var m={};
  for(var i=0;i<ROZBOR_BANK.length;i++){ var e=ROZBOR_BANK[i];
    var f=m[e.fam]||(m[e.fam]={fam:e.fam, koreny:[], slova:[]});
    f.slova.push(e);
    for(var j=0;j<e.chunks.length;j++) if(e.chunks[j].r==='kor' && f.koreny.indexOf(e.chunks[j].t)<0) f.koreny.push(e.chunks[j].t);
  }
  return m;
}

};

function topicEnabled(){
  var su=DB.settings.setup;
  return { math: su.mathOn && DB.settings.activeTables.length>0,
           czech: su.czechOn && DB.settings.activeRows.length>0 };
}

function newRound(){
  DB.daily.rounds=(DB.daily.rounds||0)+1; saveDB();
  G._roundStart=Date.now();
  return {
    goal: dailyGoal(),
    // daily garden already full -> "free play": flowers go to the meadow only
    freePlay: ((DB.daily.flowers&&DB.daily.flowers.total)||0) >= dailyGoal(),
    presented:0,           // number of questions shown
    requeue:[],            // {item, due}
    current:null,          // current question
    feedback:null,         // null|'correct'|'wrong'
    needsExplain:false,
    grownThisRound:0,
    wrongItems:{}          // id/key -> label of items missed this round
  };
}

function makeMathItem(avoid){ var f=pickMathFact(avoid); return {topic:'math', a:f.a, b:f.b, key:f.key}; }
function makeCzechItem(avoid){ var w=pickWord(avoid); if(!w) return null; return {topic:'czech', w:w}; }

function nextItem(){
  var R=G.round;
  // due requeued item?
  for(var i=0;i<R.requeue.length;i++){ if(R.requeue[i].due<=R.presented){ var it=R.requeue[i].item; R.requeue.splice(i,1); return it; } }
  var en=topicEnabled();
  var pickTopic;
  if(en.math && en.czech) pickTopic = Math.random()<0.5 ? 'math':'czech';
  else pickTopic = en.math ? 'math' : 'czech';
  var avoidKey = R.current && R.current.topic==='math' ? R.current.key : null;
  var avoidId = R.current && R.current.topic==='czech' ? R.current.w.id : null;
  if(pickTopic==='math'){ return makeMathItem(avoidKey); }
  var ci=makeCzechItem(avoidId); if(ci) return ci; return makeMathItem(avoidKey);
}

function startQuestion(){
  var R=G.round;
  R.current=nextItem();
  R.presented++;
  R.feedback=null;
  R.pick=null;
  R.needsExplain = DB.settings.explainMode && (R.presented % 4 === 0);
  // record seen
  if(R.current.topic==='math'){ var k=R.current.key; var st=factStat(k); st.seen++; DB.facts[k]=st; }
  else { var id=R.current.w.id; var ws=wordStat(id); ws.seen++; DB.words[id]=ws; }
  saveDB();
  setLocked(true);
  renderRound();
  clearTimeout(G._lockT);
  G._lockT=setTimeout(function(){ setLocked(false); var sc=app.querySelector('.screen'); if(sc) sc.classList.remove('waiting'); var el=app.querySelector('.answers'); if(el) el.classList.remove('locked'); var owlb=app.querySelector('.owlbox'); if(owlb) owlb.classList.remove('think'); var h=app.querySelector('.hint'); if(h) h.textContent='Vyber, co ti přijde správné'; }, 3000);
}
function setLocked(v){ G.locked=v; }

function answer(correct, item, pick){
  var R=G.round; if(G.locked) return; if(R.feedback) return;
  R.pick=pick;
  if(item.topic==='math'){ var st=factStat(item.key); if(correct) st.correct++; else st.wrong++; DB.facts[item.key]=st; }
  else { var ws=wordStat(item.w.id); if(correct) ws.correct++; else ws.wrong++; DB.words[item.w.id]=ws; }
  // daily metrics
  var an=DB.daily.answers && DB.daily.answers[item.topic];
  if(an){ if(correct) an.ok++; else an.bad++; }
  if(correct){
    R.feedback='correct';
    R.grownThisRound++;
    addFlower(item.topic);
  } else {
    R.feedback='wrong';
    // schedule requeue 3-5 later
    R.requeue.push({item:item, due:R.presented+randInt(3,5)});
    // remember for summary
    if(item.topic==='math') R.wrongItems[item.key]=item.a+' × '+item.b;
    else R.wrongItems[item.w.id]=item.w.pre+item.w.answer+item.w.post;
    saveDB();
  }
  renderRound();
}

function continueRound(){
  var R=G.round;
  var done = R.freePlay
    ? (R.grownThisRound>=R.goal)
    : (((DB.daily.flowers&&DB.daily.flowers.total)||0)>=R.goal);
  if(R.feedback==='correct' && done){ endRound(); return; }
  startQuestion();
}
function endRound(){
  // accrue play time
  if(G._roundStart){ DB.daily.playMs=(DB.daily.playMs||0)+(Date.now()-G._roundStart); G._roundStart=0; saveDB(); }
  G.screen='summary'; render();
}

/* --- skládačka: sada dne generovaná z rodin v ROZBOR_BANK --- */
// vhodná rodina = jediná podoba kořene (bez střídání hlásek) + dost slov na skládání
var SKLAD_MIN_WORDS=4;
var SKLAD_MAX_WORDS=5;   // kolo se dá dokončit i u velkých rodin
function chunkOf(e,role){ for(var i=0;i<e.chunks.length;i++){ if(e.chunks[i].r===role) return e.chunks[i].t; } return null; }
function skladEligible(){
  var fams=rozborFamilies(), out=[];
  Object.keys(fams).forEach(function(k){ var f=fams[k];
    if(f.koreny.length===1 && f.slova.length>=SKLAD_MIN_WORDS) out.push(f);
  });
  return out;
}
function buildSkladSet(f){
  var pre=[], suf=[], kon=[], valid=[];
  function reg(arr,t){ if(t===null) return null;
    for(var i=0;i<arr.length;i++){ if(arr[i].id===t) return t; }
    arr.push({id:t,text:t}); return t; }
  var sorted=f.slova.slice().sort(function(a,b){ return a.chunks.length-b.chunks.length || (a.w<b.w?-1:1); });
  if(sorted.length>SKLAD_MAX_WORDS) sorted=sorted.slice(0,SKLAD_MAX_WORDS);
  for(var i=0;i<sorted.length;i++){ var e=sorted[i];
    valid.push({ pre:reg(pre,chunkOf(e,'pre')), suf:reg(suf,chunkOf(e,'prip')),
                 kon:reg(kon,chunkOf(e,'kon')), word:e.w, parts:e.chunks });
  }
  return { root:f.koreny[0], fam:f.fam, pre:pre, suf:suf, kon:kon, valid:valid };
}
var SKLAD=null; // sada dne — naplní skladForToday()
function skladForToday(){
  var st=BD().sklad, elig=skladEligible(), f=null;
  if(st.fam){ for(var i=0;i<elig.length;i++){ if(elig[i].fam===st.fam){ f=elig[i]; break; } } }
  if(!f){
    var cands=elig.filter(function(x){ return x.fam!==DB.lastSkladFam; });
    if(!cands.length) cands=elig;
    f=cands[rnd(cands.length)];
    st.fam=f.fam; st.found=[]; st.done=false; DB.lastSkladFam=f.fam; saveDB();
  }
  SKLAD=buildSkladSet(f);
  return SKLAD;
}

/* --- rozbor: sada dne z ROZBOR_BANK (váha podle chyb, bez nedávných slov) --- */
var ROZBOR_N=3;      // slov na den
var ROZ_RECENT_MAX=15;
var ROZ_BY_ID=null;
function rozById(id){
  if(!ROZ_BY_ID){ ROZ_BY_ID={}; for(var i=0;i<ROZBOR_BANK.length;i++) ROZ_BY_ID[ROZBOR_BANK[i].id]=ROZBOR_BANK[i]; }
  return ROZ_BY_ID[id]||null;
}
function rozStat(id){ return DB.rozstats[id]||{seen:0,correct:0,wrong:0}; }
function rozPickSession(n){
  var maxLvl=(DB.settings.setup&&DB.settings.setup.czechLevel)||3;
  var rows=DB.settings.activeRows;
  function build(lvlCap, ignoreRows, ignoreRecent){
    var out=[];
    for(var i=0;i<ROZBOR_BANK.length;i++){ var e=ROZBOR_BANK[i];
      if(e.level>lvlCap) continue;
      if(!ignoreRows && e.row && rows.indexOf(e.row)<0) continue;
      if(!ignoreRecent && DB.rozRecent.indexOf(e.id)>=0) continue;
      var st=rozStat(e.id); var att=st.correct+st.wrong; var err=att? st.wrong/att : 0;
      var w=1+2*err; if(att===0) w*=1.3;
      out.push({w:w, item:e});
    }
    return out;
  }
  var cands=build(maxLvl,false,false);
  if(cands.length<n) cands=build(3,false,false);   // úroveň moc přísná -> uvolnit
  if(cands.length<n) cands=build(3,true,false);    // aktivní řady moc přísné -> uvolnit
  if(cands.length<n){ DB.rozRecent=[]; cands=build(3,true,true); } // zásoba vyčerpaná -> reset
  var set=[];
  while(set.length<n && cands.length){
    var p=weightedPick(cands);
    set.push(p.item.id);
    cands=cands.filter(function(c){ return c.item.id!==p.item.id; });
  }
  return set;
}
function rozSession(){
  var st=BD().rozbor;
  var valid = st.set && st.set.length===ROZBOR_N && st.set.every(function(id){ return !!rozById(id); });
  if(!valid){ st.set=rozPickSession(ROZBOR_N); st.idx=0; st.done=false; saveDB(); }
  return st.set.map(rozById);
}
function rozResetPick(){
  var S=rozSession(), st=BD().rozbor;
  var cur=S[Math.min(st.idx,S.length-1)];
  var p=[]; for(var i=0;i<cur.chunks.length;i++) p.push(null);
  var brush=(G.bRoz&&G.bRoz.brush)?G.bRoz.brush:'kor';  // barva se přenáší mezi slovy
  G.bRoz={pick:p, ok:false, wrong:false, hadWrong:false, brush:brush};
}

/* --- spojovačka: jedna RODINA za kolo, dítě spojí příbuzná slova s obrázky --- */
var SPOJ_MAX=3;        // kolik členů rodiny ukázat (2–3)
var SPOJ_RECENT_MAX=5; // kolik posledních rodin vynechat
function spojHasPic(e){ return !!(e.svg||e.emoji); }
// rodiny, které mají ≥2 zobrazitelné (obrázkové) členy v rámci úrovně/řad
function spojEligibleFams(lvlCap, ignoreRows){
  var rows=DB.settings.activeRows, m={};
  for(var i=0;i<ROZBOR_BANK.length;i++){ var e=ROZBOR_BANK[i];
    if(!spojHasPic(e)) continue;
    if(e.level>lvlCap) continue;
    if(!ignoreRows && e.row && rows.indexOf(e.row)<0) continue;
    (m[e.fam]||(m[e.fam]=[])).push(e);
  }
  var out=[]; for(var f in m){ if(m[f].length>=2) out.push({fam:f, members:m[f]}); }
  return out;
}
function spojPickFamily(){
  var maxLvl=(DB.settings.setup&&DB.settings.setup.czechLevel)||3;
  var fams=spojEligibleFams(maxLvl,false);
  if(!fams.length) fams=spojEligibleFams(3,false);   // úroveň moc přísná -> uvolnit
  if(!fams.length) fams=spojEligibleFams(3,true);    // aktivní řady moc přísné -> uvolnit
  var cands=fams.filter(function(f){ return DB.spojRecent.indexOf(f.fam)<0; });
  if(!cands.length){ DB.spojRecent=[]; cands=fams; } // všechny nedávno -> reset
  if(!cands.length) return {fam:null, ids:[]};
  var pick=cands[rnd(cands.length)];
  var mem=shuffle(pick.members.slice()).slice(0,SPOJ_MAX);
  return {fam:pick.fam, ids:mem.map(function(x){ return x.id; })};
}
function spojSession(){
  var st=BD().spoj;
  var valid = st.set && st.set.length>=2 && st.fam && st.set.every(function(id){ return !!rozById(id); });
  if(!valid){ var p=spojPickFamily(); st.fam=p.fam; st.set=p.ids; st.matched=[]; st.done=false; saveDB(); }
  return st.set.map(rozById);
}
// kořen k zobrazení = nejčastější kořen mezi ukázanými členy
function spojRoot(members){
  var cnt={};
  for(var i=0;i<members.length;i++){ for(var j=0;j<members[i].chunks.length;j++){ var c=members[i].chunks[j];
    if(c.r==='kor'){ cnt[c.t]=(cnt[c.t]||0)+1; } } }
  var best=null,bn=0; for(var k in cnt){ if(cnt[k]>bn){ bn=cnt[k]; best=k; } }
  return best;
}

/* --- navigation --- */
function enterBuild(){
  markActivity();
  G.screen='build'; G.bView='hub';
  G._buildStart=Date.now();
  G.bSk={pre:null,suf:null,kon:null,msg:null};
  rozResetPick();
  G.bSpoj={sel:null,msg:null,picOrder:null};
  resetHint();
  render();
}
function exitBuild(){
  if(G._buildStart){ DB.daily.playMs=(DB.daily.playMs||0)+(Date.now()-G._buildStart); G._buildStart=0; saveDB(); }
  resetHint();
  G.screen='garden'; render();
}
// nové kolo s čerstvým obsahem (po dokončení nebo při otevření hotové hry)
function newSkladRound(){ var st=BD().sklad; st.fam=null; st.found=[]; st.done=false; saveDB(); skladForToday(); }
function newRozborRound(){ var st=BD().rozbor; st.set=rozPickSession(ROZBOR_N); st.idx=0; st.done=false; saveDB(); rozResetPick(); }
function newSpojRound(){ var st=BD().spoj; st.fam=null; st.set=[]; st.matched=[]; st.done=false; saveDB(); spojSession(); }
function openBuildGame(v){
  markActivity();
  G.bView=v;
  if(v==='sklad'){ if(BD().sklad.done) newSkladRound(); else skladForToday(); G.bSk={pre:null,suf:null,kon:null,msg:null}; resetHint(); }
  else if(v==='rozbor'){ if(BD().rozbor.done) newRozborRound(); else rozResetPick(); }
  else if(v==='spoj'){ if(BD().spoj.done) newSpojRound(); else spojSession(); G.bSpoj={sel:null,msg:null,picOrder:null}; }
  render();
}

/* --- skládačka logic --- */
function pickSk(lane,id){ markActivity(); G.bSk[lane]=(G.bSk[lane]===id)?null:id; G.bSk.msg=null; render(); }
function clearSk(lane){ markActivity(); G.bSk[lane]=null; G.bSk.msg=null; render(); }
function buildSk(){
  markActivity();
  var st=BD().sklad;
  var m=null;
  for(var i=0;i<SKLAD.valid.length;i++){ var v=SKLAD.valid[i];
    if((v.pre||null)===(G.bSk.pre||null) && (v.suf||null)===(G.bSk.suf||null) && (v.kon||null)===(G.bSk.kon||null)){ m=v; break; } }
  if(!m){ G.bSk.msg='no'; render(); return; }
  if(st.found.indexOf(m.word)>=0){ G.bSk.msg='dup'; render(); return; }
  st.found.push(m.word);
  if(st.found.length>=SKLAD.valid.length){ st.done=true; st.everDone=true; }
  // našla slovo, zatímco sova ještě přemýšlela -> přišla na to sama
  var selfSolved = (G.bHint.phase==='wait');
  resetHint();
  G.bSk={pre:null,suf:null,kon:null,msg:selfSolved?'self':null};
  addFlower('build');
  render();
}

/* --- nápověda: sova přemýšlí, pak odkrývá postupně (nikdy celé slovo) --- */
function resetHint(){
  if(G.bHint && G.bHint.t) clearTimeout(G.bHint.t);
  G.bHint={phase:'idle', wi:-1, stage:0, t:null};
}
function hintTargetIdx(){
  var found=BD().sklad.found;
  for(var i=0;i<SKLAD.valid.length;i++){ if(found.indexOf(SKLAD.valid[i].word)<0) return i; }
  return -1;
}
function pressHint(){
  markActivity();
  var H=G.bHint;
  if(H.phase==='wait') return;
  if(H.phase==='shown' && H.stage>=2) return;
  if(H.phase==='idle'){
    var wi=hintTargetIdx(); if(wi<0) return;
    H.wi=wi; H.stage=1;
  } else {
    H.stage=2;
  }
  H.phase='wait';
  G.bSk.msg=null;
  H.t=setTimeout(function(){
    H.phase='shown'; H.t=null;
    var st=BD().sklad; st.hints=(st.hints||0)+1; saveDB();
    if(G.screen==='build' && G.bView==='sklad') render();
  }, HINT_WAIT_MS);
  render();
}
function hintTileKey(v){
  if(v.pre) return 'pre:'+v.pre;
  if(v.suf) return 'suf:'+v.suf;
  if(v.kon) return 'kon:'+v.kon;
  return null;
}
function hintTileText(key){
  if(!key) return '';
  var lane=key.split(':')[0], id=key.split(':')[1];
  var arr=SKLAD[lane];
  for(var i=0;i<arr.length;i++){ if(arr[i].id===id) return arr[i].text; }
  return '';
}
function skTileText(lane,id){
  if(!id) return null; var arr=SKLAD[lane];
  for(var i=0;i<arr.length;i++){ if(arr[i].id===id) return arr[i].text; }
  return null;
}
// živý náhled skládaného slova — dítě si slovo přečte dřív, než ho složí
function skPreviewHTML(){
  var segs=[];
  var pt=skTileText('pre',G.bSk.pre); if(pt) segs.push({t:pt,r:'pre'});
  segs.push({t:SKLAD.root,r:'kor'});
  var sf=skTileText('suf',G.bSk.suf); if(sf) segs.push({t:sf,r:'prip'});
  var kn=skTileText('kon',G.bSk.kon); if(kn) segs.push({t:kn,r:'kon'});
  var onlyRoot=(segs.length===1);
  var h='';
  for(var i=0;i<segs.length;i++){
    h+='<span class="seg'+(onlyRoot?' dim':'')+'" style="color:'+(onlyRoot?'':ROLE[segs[i].r].fg)+';">'+esc(segs[i].t)+'</span>';
  }
  return '<div style="display:flex; flex-direction:column; align-items:center; gap:4px;">'+
    '<span class="skpvlbl">SKLÁDÁŠ SLOVO</span>'+

}

/* --- rozbor logic (paleta barev: vyber barvu, natři dílky) --- */
function rozBrush(role){
  markActivity();
  if(G.bRoz.ok || BD().rozbor.done) return;
  G.bRoz.brush=role; G.bRoz.wrong=false;
  render();
}
function rozPaint(i){
  markActivity();
  if(G.bRoz.ok || BD().rozbor.done) return;
  var b=G.bRoz.brush||'kor';
  G.bRoz.pick[i]=(G.bRoz.pick[i]===b)?null:b;   // ťuk na stejnou barvu = smazat
  G.bRoz.wrong=false;
  render();
}
function rozCheck(){
  markActivity();
  var st=BD().rozbor, S=rozSession();
  var cur=S[Math.min(st.idx,S.length-1)];
  var ok=true;
  for(var i=0;i<cur.chunks.length;i++){ if(G.bRoz.pick[i]!==cur.chunks[i].r){ ok=false; break; } }
  var rs=DB.rozstats[cur.id]||(DB.rozstats[cur.id]={seen:0,correct:0,wrong:0});
  if(ok){
    rs.seen++; if(!G.bRoz.hadWrong) rs.correct++;
    DB.rozRecent.push(cur.id);
    if(DB.rozRecent.length>ROZ_RECENT_MAX) DB.rozRecent=DB.rozRecent.slice(-ROZ_RECENT_MAX);
    G.bRoz.ok=true; G.bRoz.wrong=false;
    if(st.idx>=S.length-1){ st.done=true; st.everDone=true; }
    saveDB();
    addFlower('build');
  } else {
    G.bRoz.wrong=true; G.bRoz.hadWrong=true;
    rs.wrong++;
    st.wrong=(st.wrong||0)+1; saveDB();
  }
  render();
}
function rozNext(){
  markActivity();
  var st=BD().rozbor; st.idx++; saveDB();
  rozResetPick();
  render();
}

/* --- spojovačka logic --- */
function spojTapWord(id){
  markActivity();
  if(BD().spoj.matched.indexOf(id)>=0) return;
  G.bSpoj.sel=id; G.bSpoj.msg=null; render();
}
function spojTapPic(id){
  markActivity();
  var st=BD().spoj, S=spojSession(), item=null;
  for(var i=0;i<S.length;i++){ if(S[i].id===id) item=S[i]; }
  if(!item || st.matched.indexOf(item.id)>=0) return;
  if(!G.bSpoj.sel){ G.bSpoj.msg='first'; render(); return; }
  if(G.bSpoj.sel===item.id){
    st.matched.push(item.id);
    var rs=DB.rozstats[item.id]||(DB.rozstats[item.id]={seen:0,correct:0,wrong:0}); rs.seen++;
    if(st.matched.length>=S.length){
      st.done=true; st.everDone=true;
      if(st.fam){ DB.spojRecent.push(st.fam);
        if(DB.spojRecent.length>SPOJ_RECENT_MAX) DB.spojRecent=DB.spojRecent.slice(-SPOJ_RECENT_MAX); }
    }
    G.bSpoj.sel=null; G.bSpoj.msg=null;
    saveDB();
    addFlower('build');
  } else {
    st.wrong=(st.wrong||0)+1; saveDB();
    G.bSpoj.msg='miss';
  }
  render();
}

/* --- spojovačka drag & drop (ťuknutí na slovo + obrázek funguje dál) --- */
function spojClearDropHilite(){
  var hs=app.querySelectorAll('.sppic.dropok');
  for(var i=0;i<hs.length;i++) hs[i].classList.remove('dropok');
}
function spojPicAt(x,y){
  var n=document.elementFromPoint(x,y);
  while(n && n!==document.body){
    if(n.classList && n.classList.contains('sppic')) return n;
    n=n.parentNode;
  }
  return null;
}
function bindSpojDrag(){
  var ws=app.querySelectorAll('.spword');
  Array.prototype.forEach.call(ws, function(el){
    el.addEventListener('pointerdown', function(ev){
      var id=el.getAttribute('data-w');
      if(BD().spoj.matched.indexOf(id)>=0) return;
      markActivity();
      ev.preventDefault();
      try{ el.setPointerCapture(ev.pointerId); }catch(e){}
      var sx=ev.clientX, sy=ev.clientY, moved=false, ghost=null;
      function cleanup(){
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', onUp);
        el.removeEventListener('pointercancel', onCancel);
        if(ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
        ghost=null;
        el.classList.remove('dragsrc');
        spojClearDropHilite();
      }
      function onMove(e2){
        var dx=e2.clientX-sx, dy=e2.clientY-sy;
        if(!moved){
          if(dx*dx+dy*dy<64) return; // ještě ťuknutí, ne tažení
          moved=true;
          var r=el.getBoundingClientRect();
          ghost=el.cloneNode(true);
          ghost.className='spword spghost';
          ghost.style.left=r.left+'px'; ghost.style.top=r.top+'px';
          ghost.style.width=r.width+'px'; ghost.style.margin='0';
          document.body.appendChild(ghost);
          el.classList.add('dragsrc');
        }
        ghost.style.transform='translate('+dx+'px,'+dy+'px) scale(1.05)';
        spojClearDropHilite();
        var pic=spojPicAt(e2.clientX,e2.clientY);
        if(pic && !pic.classList.contains('hit')) pic.classList.add('dropok');
      }
      function onUp(e2){
        var wasDrag=moved, pic=wasDrag? spojPicAt(e2.clientX,e2.clientY) : null;
        cleanup();
        if(!wasDrag){ spojTapWord(id); return; }
        if(pic && !pic.classList.contains('hit')){
          G.bSpoj.sel=id;
          spojTapPic(pic.getAttribute('data-p'));
        } else {
          G.bSpoj.sel=null; G.bSpoj.msg=null; render();
        }
      }
      function onCancel(){ cleanup(); render(); }
      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', onUp);
      el.addEventListener('pointercancel', onCancel);
    });
  });
}

// úponek: po správném spojení nakresli šlahoun od slova k jeho obrázku
function drawSpojVines(){
  var svg=document.getElementById('spVines'); if(!svg) return;
  var wrap=svg.parentNode, base=wrap.getBoundingClientRect();
  if(!base.width){ svg.innerHTML=''; return; }
  svg.setAttribute('viewBox','0 0 '+base.width+' '+base.height);
  var matched=BD().spoj.matched, h='';
  for(var i=0;i<matched.length;i++){
    var w=wrap.querySelector('.spword[data-w="'+matched[i]+'"]');
    var p=wrap.querySelector('.sppic[data-p="'+matched[i]+'"]');
    if(!w||!p) continue;
    var wr=w.getBoundingClientRect(), pr=p.getBoundingClientRect();
    var x1=wr.right-base.left, y1=wr.top+wr.height/2-base.top;
    var x2=pr.left-base.left,  y2=pr.top+pr.height/2-base.top;
    if(x2<=x1){ continue; }          // sloupce se zalomily (úzká obrazovka) -> nekresli
    var mx=(x1+x2)/2;
    h+='<path d="M'+x1+' '+y1+' C '+mx+' '+y1+' '+mx+' '+y2+' '+x2+' '+y2+'"></path>';
    h+='<circle cx="'+mx+'" cy="'+((y1+y2)/2)+'" r="6"></circle>';
  }
  svg.innerHTML=h;
}

function skladHTML(){
  var st=BD().sklad;
  if(!SKLAD || SKLAD.fam!==st.fam) skladForToday();
  var H=G.bHint;
  var hv=(H.wi>=0)?SKLAD.valid[H.wi]:null;
  var wantLane={pre:false,suf:false,kon:false};
  if(H.phase==='shown' && H.stage===1 && hv){ wantLane.pre=!!hv.pre; wantLane.suf=!!hv.suf; wantLane.kon=!!hv.kon; }
  var wantTile=(H.phase==='shown' && H.stage===2 && hv)? hintTileKey(hv) : null;

  function laneCol(lane, role){
    var selId=G.bSk[lane], text=null;
    var arr=SKLAD[lane];
    for(var i=0;i<arr.length;i++){ if(arr[i].id===selId) text=arr[i].text; }
    var want=wantLane[lane]?' want':'';
    var slot = selId
      ? '<button class="skslot '+ROLE[role].cls+want+'" data-clear="'+lane+'">'+esc(text)+'</button>'
      : '<div class="skslot empty '+ROLE[role].cls+want+'">+</div>';
    var tiles='';
    for(var j=0;j<arr.length;j++){ var t=arr[j];
      var cls='tile '+ROLE[role].cls+(G.bSk[lane]===t.id?' sel':'')+((wantTile===lane+':'+t.id)?' want':'');
      tiles+='<button class="'+cls+'" data-lane="'+lane+'" data-id="'+t.id+'">'+esc(t.text)+'</button>';
    }
    return '<div class="skcol">'+slot+'<span class="cl" style="color:'+ROLE[role].soft+';">'+ROLE[role].label+'</span>'+
      '<div class="lanetiles">'+tiles+'</div></div>';
  }

  // hint button state + message
  var hintLabel='💡 Nápověda', hintDis=false, hintCls='';
  if(st.done || hintTargetIdx()<0){ hintDis=true; }
  else if(H.phase==='wait'){ hintDis=true; hintCls=' waiting'; hintLabel='Sova přemýšlí…'; }
  else if(H.phase==='shown' && H.stage===1){ hintLabel='💡 Napověz víc'; }
  else if(H.phase==='shown' && H.stage>=2){ hintDis=true; }
  var hintMsg='';
  if(H.phase==='wait'){
    hintMsg='<div class="bmsg mut">🦉 Hmm, nech mě chvilku přemýšlet… zkus to zatím sama!</div>';
  } else if(H.phase==='shown' && hv){
    var txt;
    if(H.stage===1){
      if(!hv.pre && !hv.suf && !hv.kon){ txt='Zkus úplně samotný kořen — nic nepřidávej!'; }
      else{ var need=[]; if(hv.pre) need.push('předponu'); need.push('kořen'); if(hv.suf) need.push('příponu'); if(hv.kon) need.push('koncovku');
        txt='Zkus slovo, které má '+need.join(' + ')+'.'; }
    } else {
      if(!hv.pre && !hv.suf && !hv.kon){ txt='Nech všechna okénka prázdná a zmáčkni „Složit slovo“.'; }
      else{ txt='Zkus dílek „'+esc(hintTileText(wantTile))+'“.'; }
    }
    hintMsg='<div class="bmsg mut">🦉 '+txt+'</div>';
  }

  // result message
  var msg='';
  if(G.bSk.msg==='no') msg='<div class="bmsg nudge">Takové slovo neznáme — zkus jinou kombinaci dílků.</div>';
  else if(G.bSk.msg==='dup') msg='<div class="bmsg mut">To slovo už v zahradě kvete. Zkus složit další.</div>';
  else if(G.bSk.msg==='self') msg='<div class="bmsg good">Vidíš! Přišla jsi na to úplně sama. 🌟</div>';

  // found words
  var fw='';
  for(var i=0;i<SKLAD.valid.length;i++){ var v=SKLAD.valid[i];
    if(st.found.indexOf(v.word)>=0) fw+='<div class="fword">'+miniFlower()+mpartsHTML(v.parts)+'</div>';
  }

  return '<div class="bwrap">'+
    '<div class="bnote">Poskládej slovo z kořene <b style="color:#5f8a4a;">-'+esc(SKLAD.root)+'-</b>. Můžeš přidat předponu, příponu i koncovku. Kolik slov složíš?</div>'+
    '<div class="sklane">'+
      (SKLAD.pre.length? laneCol('pre','pre') : '')+
      '<div class="skcol"><div class="skslot r-kor">'+esc(SKLAD.root)+'</div><span class="cl" style="color:'+ROLE.kor.soft+';">KOŘEN</span></div>'+
      (SKLAD.suf.length? laneCol('suf','prip') : '')+
      (SKLAD.kon.length? laneCol('kon','kon') : '')+
    '</div>'+
    skPreviewHTML()+
    '<div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center; align-items:center;">'+
      '<button class="cta small" id="skGo">Složit slovo</button>'+
      '<button class="hintbtn'+hintCls+'" id="skHint"'+(hintDis?' disabled':'')+'>'+hintLabel+'</button>'+
    '</div>'+
    hintMsg+msg+
    '<div class="foundwrap">'+
      '<div style="font-size:19px; font-weight:800; color:var(--muted2);">Vypěstovaná slova · '+st.found.length+'/'+SKLAD.valid.length+'</div>'+
      '<div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; min-height:50px;">'+fw+'</div>'+
    '</div>'+
    (st.done? buildDonePanel('Skvěle! Složila jsi všech '+SKLAD.valid.length+' slov.') : '')+

}

/* ---------------- slovní druhy (parts of speech) ---------------- */
var DRUHY_PROMPT='Do kterého záhonu semínko patří?';
var DRUHY_RECENT_MAX=18;
var DRUHY_BEDS=[
  {t:'pod', num:1,  title:'Podstatná jména', q:'kdo? co?',        bg:'#ece0fb', bd:'#c9b3ef', fg:'#7a5bc0'},
  {t:'prid',num:2,  title:'Přídavná jména',  q:'jaký? jaká?',     bg:'#fbe0eb', bd:'#f0b3cc', fg:'#c85f8b'},
  {t:'zaj', num:3,  title:'Zájmena',         q:'on, my, kdo',     bg:'#dce7fb', bd:'#b3c9ef', fg:'#4f6fb0'},
  {t:'cis', num:4,  title:'Číslovky',        q:'kolik? kolikátý?',bg:'#d6eeea', bd:'#9dd0c8', fg:'#3f8c80'},
  {t:'slo', num:5,  title:'Slovesa',         q:'co dělá?',        bg:'#dcecd6', bd:'#a9cf95', fg:'#5f8a4a'},
  {t:'pris',num:6,  title:'Příslovce',       q:'kde? kdy? jak?',  bg:'#f7ecc9', bd:'#e8cf8f', fg:'#b9892b'},
  {t:'pred',num:7,  title:'Předložky',       q:'v, ke, přes',     bg:'#fbe3d6', bd:'#f0c3a6', fg:'#c07a4f'},
  {t:'spoj',num:8,  title:'Spojky',          q:'i, nebo, když',   bg:'#efe0ef', bd:'#d3b3d3', fg:'#9a5f9a'},
  {t:'cast',num:9,  title:'Částice',         q:'asi, prý, nechť', bg:'#e2e4ea', bd:'#bcc0cc', fg:'#6a7080'},
  {t:'cit', num:10, title:'Citoslovce',      q:'mňau! jé! žbluňk!',bg:'#fbdcdc',bd:'#f0b0b0', fg:'#c05f5f'}
];
function druhyBedByT(t){ for(var i=0;i<DRUHY_BEDS.length;i++){ if(DRUHY_BEDS[i].t===t) return DRUHY_BEDS[i]; } return DRUHY_BEDS[0]; }
// slova pečlivě vybraná tak, aby slovní druh byl jednoznačný pro 3. třídu
var DRUHY_POOL=(function(){
  var groups={
    pod:['sova','motýl','zahrada','strom','kočka','pes','škola','kniha','jablko','květina','sluníčko','maminka'],
    prid:['žlutý','malý','velký','sladký','hezký','veselý','modrý','zelený','teplý','rychlý','silný','chytrý'],
    zaj:['já','ty','on','ona','my','vy','ten','ta','to','můj','tvůj','náš'],
    cis:['jeden','dva','tři','čtyři','pět','šest','sedm','osm','devět','deset','první','druhý'],
    slo:['kvete','létá','spí','běží','čte','píše','zpívá','skáče','jí','pije','maluje','sedí'],
    pris:['rychle','pomalu','dole','nahoře','večer','ráno','dnes','tady','tam','venku','doma','brzy'],
    pred:['na','pod','za','v','do','od','ke','přes','u','před','nad','mezi'],
    spoj:['a','i','ale','nebo','protože','když','že','aby','ani','avšak'],
    cast:['asi','prý','snad','kéž','ať','nechť','možná','bohužel','naštěstí'],
    cit:['haf','mňau','bum','ach','jé','haló','žbluňk','cink','bác','hop','au','kuku']
  };
  var out=[];
  for(var k in groups){ if(groups.hasOwnProperty(k)){ groups[k].forEach(function(w){ out.push({w:w,t:k}); }); } }
  return out;
})();
function druhyStat(w){ return DB.druhystats[w]||{seen:0,correct:0,wrong:0}; }
function druhyPickSession(n){
  var recent=DB.druhyRecent||[];
  var used={}, lastT=null, out=[];
  for(var k=0;k<n;k++){
    var list=[];
    for(var i=0;i<DRUHY_POOL.length;i++){ var p=DRUHY_POOL[i]; if(used[p.w]) continue;
      var st=druhyStat(p.w);
      var w=1 + st.wrong*3;
      if(recent.indexOf(p.w)>=0) w*=0.35;
      if(p.t===lastT) w*=0.15;         // vyhni se stejnému druhu hned za sebou
      list.push({p:p, w:w});
    }
    if(!list.length) break;
    var pick=weightedPick(list).p;
    out.push(pick); used[pick.w]=1; lastT=pick.t;
  }
  return out;
}
function newDruhySession(){
  return { seq:druhyPickSession(dailyGoal()), idx:0, feedback:null, wrongBed:null, beds:{}, done:false, hadWrong:false, _celeb:null };
}
function enterDruhy(){
  markActivity();
  G.screen='druhy'; G._druhyStart=Date.now();
  G.druhy=newDruhySession();
  druhyStart();
}
function exitDruhy(){
  clearTimeout(G._lockT); clearTimeout(G._advT); setLocked(false);
  if(G._druhyStart){ DB.daily.playMs=(DB.daily.playMs||0)+(Date.now()-G._druhyStart); G._druhyStart=0; saveDB(); }
  G.druhy=null; G.screen='garden'; render();
}
function druhyRestart(){
  markActivity();
  clearTimeout(G._advT);
  G.druhy=newDruhySession();
  druhyStart();
}
function druhyStart(){
  var D=G.druhy; if(!D) return;
  D.feedback=null; D.wrongBed=null; D.hadWrong=false; D._celeb=null;
  var cur=D.seq[D.idx];
  if(cur){ var st=DB.druhystats[cur.w]||(DB.druhystats[cur.w]={seen:0,correct:0,wrong:0}); st.seen++; saveDB(); }
  setLocked(true);
  renderDruhy();
  clearTimeout(G._lockT);
  G._lockT=setTimeout(function(){
    setLocked(false);
    if(G.screen!=='druhy') return;
    var sc=app.querySelector('.screen'); if(sc) sc.classList.remove('waiting');
    var bg=app.querySelector('.druhy-beds'); if(bg) bg.classList.remove('locked');
    var h=app.querySelector('.druhy-hint'); if(h) h.textContent=DRUHY_PROMPT;
  }, 3000);
}
function druhyTap(bedId){
  markActivity();
  if(G.locked) return;
  var D=G.druhy; if(!D || D.done || D.feedback==='correct') return;
  var cur=D.seq[D.idx]; if(!cur) return;
  var st=DB.druhystats[cur.w]||(DB.druhystats[cur.w]={seen:0,correct:0,wrong:0});
  var an=DB.daily.answers && DB.daily.answers.druhy;
  if(bedId===cur.t){
    D.beds[bedId]=(D.beds[bedId]||0)+1;
    D.feedback='correct'; D.wrongBed=null;
    if(!D.hadWrong) st.correct++;
    DB.druhyRecent.push(cur.w);
    if(DB.druhyRecent.length>DRUHY_RECENT_MAX) DB.druhyRecent=DB.druhyRecent.slice(-DRUHY_RECENT_MAX);
    if(an) an.ok++;
    addFlower('druhy');   // saves DB
    var last=(D.idx>=D.seq.length-1);
    if(last) D.done=true;
    renderDruhy();
    if(!last){ clearTimeout(G._advT); G._advT=setTimeout(function(){ D.idx++; druhyStart(); }, 1150); }
  } else {
    D.feedback='wrong'; D.wrongBed=bedId; D.hadWrong=true;
    st.wrong++; if(an) an.bad++; saveDB();
    renderDruhy();
  }
}
function renderDruhy(){
  G.screen='druhy';
  var D=G.druhy; if(!D){ enterDruhy(); return; }
  var sleeping=G._idle;
  var mood;
  if(D.done) mood='smile';
  else if(D.feedback==='correct'){ if(!D._celeb) D._celeb=Math.random()<0.3?'cool':'smile'; mood=D._celeb; }
  else { D._celeb=null; mood=sleeping?'sleepy':'normal'; }

  var dots='';
  for(var i=0;i<D.seq.length;i++){
    var col = (D.done||i<D.idx) ? '#86bf67' : (i===D.idx ? '#eaa93f' : '#e6d3a6');
    dots+='<span class="druhy-dot" style="background:'+col+';"></span>';
  }
  var sub=''+
    '<div class="bhead">'+
      '<button class="bback" id="druhyBack">‹ Zahrada</button>'+
      '<div class="btitle">Slovní druhy</div>'+
      '<div style="width:96px; flex:none;"></div>'+
    '</div>'+
    '<div class="druhy-dots">'+dots+'</div>';

  var body;
  if(D.done){
    body=''+
      '<div class="druhy-done"><div class="bpanel">'+bigSprout()+
        '<div class="pt">Skvěle! Roztřídila jsi všechna slova.</div>'+
        '<div class="druhy-donesub">Každé slovo našlo svůj slovní druh a rozkvetlo.</div>'+
        '<div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">'+
          '<button class="cta small" id="druhyAgain">Ještě jednou</button>'+
          '<button class="btn2 ghost" id="druhyHome">Zpět do zahrady</button>'+
        '</div>'+
      '</div></div>';
  } else {
    var cur=D.seq[D.idx];
    var hint = D.feedback==='correct' ? 'Krásně roste!' : (G.locked ? 'přemýšlej…' : DRUHY_PROMPT);
    var owlAnim = (G.locked && D.feedback!=='correct') ? 'druhy-owl think' : 'druhy-owl';
    var beds='<div class="druhy-beds'+(G.locked?' locked':'')+'">';
    for(var b=0;b<DRUHY_BEDS.length;b++){
      var bd=DRUHY_BEDS[b];
      var ring = (D.feedback==='correct' && bd.t===cur.t) ? '0 0 0 4px #86bf67'
               : (D.wrongBed===bd.t) ? '0 0 0 4px #f0c088'
               : '0 8px 18px -12px rgba(90,70,40,.5)';
      var flowers=''; var fn=D.beds[bd.t]||0;
      for(var gI=0;gI<fn;gI++){ flowers+=chipFlower(bd.bd,'#f6d17a',18); }
      beds+='<button class="druhy-bed" data-t="'+bd.t+'" style="background:'+bd.bg+'; border-color:'+bd.bd+'; box-shadow:'+ring+';">'+
        '<span class="druhy-num" style="background:'+bd.fg+';">'+bd.num+'</span>'+
        '<span class="druhy-title" style="color:'+bd.fg+';">'+bd.title+'</span>'+
        '<span class="druhy-q" style="color:'+bd.fg+';">'+esc(bd.q)+'</span>'+
        '<span class="druhy-flowers">'+flowers+'</span>'+
      '</button>';
    }
    beds+='</div>';
    var wrong = D.feedback==='wrong'
      ? '<div class="druhy-wrong">Ještě ne — zkus jiný záhon. Nápověda: «'+esc(druhyBedByT(cur.t).q)+'»</div>'
      : '';
    body=''+
      '<div class="druhy-play">'+
        '<div class="druhy-top">'+
          '<div class="'+owlAnim+'">'+owlSVG()+'</div>'+
          '<div class="druhy-wordcol">'+
            '<div class="druhy-word">'+esc(cur.w)+'</div>'+
            '<div class="druhy-hint">'+hint+'</div>'+
          '</div>'+
        '</div>'+
        beds+ wrong+
      '</div>';
  }

  var html=''+
  '<div class="screen rise'+(G.locked?' waiting':'')+'" style="background:linear-gradient(180deg,#fdf7ea 0%,#f6edd4 100%); display:flex; flex-direction:column;">'+
    topBarHTML()+ sub+ body+
  '</div>';
  app.innerHTML=html;
  setOwlMood(app, mood);

  var bk=document.getElementById('druhyBack'); if(bk) bk.addEventListener('click', exitDruhy);
  var ag=document.getElementById('druhyAgain'); if(ag) ag.addEventListener('click', druhyRestart);
  var hm=document.getElementById('druhyHome'); if(hm) hm.addEventListener('click', exitDruhy);
  if(!D.done){
    app.querySelectorAll('.druhy-bed').forEach(function(btn){
      btn.addEventListener('click', function(){ druhyTap(btn.getAttribute('data-t')); });
    });
  }
}

/* ---------------- parent gate + panel ---------------- */
function openGate(){
  markActivity();
  var a=randInt(6,9), b=randInt(6,9); // simple product like 7×8
  var target=a*b; var entry='';
  var html=''+
  '<div class="overlay" id="ov">'+
    '<div class="card">'+
      '<h2>Zahradník 🌱</h2>'+
      '<div class="lead">Nastavení pro rodiče. Vyřeš příklad:</div>'+
      '<div style="font-size:40px; font-weight:800; text-align:center; margin:6px 0;">'+a+' × '+b+' = ?</div>'+
      '<div class="gateDisp" id="gd"></div>'+
      '<div class="gateMsg" id="gm"></div>'+
      '<div class="gatePad" id="pad">'+
        '<button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>'+
        '<button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>'+
        '<button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>'+
        '<button data-k="C">C</button><button data-k="0">0</button><button data-k="OK">OK</button>'+
      '</div>'+
      '<div class="rowbtns"><button class="btn2 ghost" id="gateCancel">Zpět</button></div>'+
    '</div>'+
  '</div>';
  app.insertAdjacentHTML('beforeend', html);
  var gd=document.getElementById('gd'), gm=document.getElementById('gm');
  function upd(){ gd.textContent=entry||' '; }
  document.getElementById('pad').addEventListener('click', function(e){
    var btn=e.target.closest('button'); if(!btn) return; var k=btn.getAttribute('data-k');
    if(k==='C'){ entry=''; gm.textContent=''; }
    else if(k==='OK'){
      if(parseInt(entry,10)===target){ document.getElementById('ov').remove(); openParent(); }
      else { gm.textContent='Zkus to ještě jednou.'; entry=''; }
    }
    else if(entry.length<3){ entry+=k; gm.textContent=''; }
    upd();
  });
  document.getElementById('gateCancel').addEventListener('click', function(){ document.getElementById('ov').remove(); });
}

function openParent(){
  var s=DB.settings;
  function chip(val,active,label){ return '<button class="chip" data-v="'+val+'" aria-pressed="'+(active?'true':'false')+'">'+label+'</button>'; }
  var tableChips='';
  for(var t=1;t<=10;t++){ tableChips+=chip(t, s.activeTables.indexOf(t)>=0, t); }
  var rowNames={b:'B',l:'L',m:'M',p:'P',s:'S',v:'V',z:'Z'};
  var rowChips=''; ['b','l','m','p','s','v','z'].forEach(function(r){ rowChips+=chip(r, s.activeRows.indexOf(r)>=0, rowNames[r]); });
  var segLen=''; [8,12,16].forEach(function(n){ segLen+='<button class="chip" data-len="'+n+'" aria-pressed="'+(s.sessionLength===n?'true':'false')+'">'+n+'</button>'; });

  var html=''+
  '<div class="overlay" id="pov">'+
    '<div class="card">'+
      '<h2>Zahradník 🌱</h2>'+
      '<div class="lead">Nastavení hry</div>'+
      '<div class="setblock"><div class="st">MALÁ NÁSOBILKA – ŘADY</div><div class="chips" id="tblChips">'+tableChips+'</div></div>'+
      '<div class="setblock"><div class="st">VYJMENOVANÁ SLOVA – ŘADY</div><div class="chips" id="rowChips">'+rowChips+'</div></div>'+
      '<div class="setblock"><div class="st">DÉLKA KOLA (POČET KYTIČEK)</div><div class="seg" id="lenSeg">'+segLen+'</div></div>'+
      '<div class="setblock"><div class="toggle"><div class="lab">Režim vysvětlování<br><span style="font-size:13px; font-weight:600; color:#b7a582;">každá 4. otázka: vysvětli odpověď nahlas</span></div>'+
        '<button class="switch" id="explSw" aria-pressed="'+(s.explainMode?'true':'false')+'" aria-label="Režim vysvětlování"></button></div></div>'+
      '<div class="setblock" id="warn" style="display:none; border-color:#e6b6a6; background:#fbeee8; color:#a5644f; font-weight:700; text-align:center;">Nech aktivní aspoň jedno téma (řadu násobilky nebo vyjmenovaných slov).</div>'+
      '<div class="rowbtns">'+
        '<button class="btn2 danger" id="resetBtn">Vymazat pokrok</button>'+
        '<button class="btn2 go" id="closeBtn">Hotovo</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  app.insertAdjacentHTML('beforeend', html);

  function anyTopic(){ return DB.settings.activeTables.length>0 || DB.settings.activeRows.length>0; }
  function refreshWarn(){ document.getElementById('warn').style.display = anyTopic()? 'none':'block'; }

  document.getElementById('tblChips').addEventListener('click', function(e){ var b=e.target.closest('.chip'); if(!b) return;
    var v=parseInt(b.getAttribute('data-v'),10); var arr=DB.settings.activeTables; var idx=arr.indexOf(v);
    var pressed=b.getAttribute('aria-pressed')==='true';
    if(pressed){ arr.splice(idx,1); } else if(idx<0){ arr.push(v); }
    // guard: don't allow removing the last remaining topic overall
    if(!anyTopic()){ if(pressed){ arr.push(v); } }
    b.setAttribute('aria-pressed', DB.settings.activeTables.indexOf(v)>=0?'true':'false');
    arr.sort(function(x,y){return x-y;}); saveDB(); refreshWarn();
  });
  document.getElementById('rowChips').addEventListener('click', function(e){ var b=e.target.closest('.chip'); if(!b) return;
    var v=b.getAttribute('data-v'); var arr=DB.settings.activeRows; var idx=arr.indexOf(v);
    var pressed=b.getAttribute('aria-pressed')==='true';
    if(pressed){ arr.splice(idx,1); } else if(idx<0){ arr.push(v); }
    if(!anyTopic()){ if(pressed){ arr.push(v); } }
    b.setAttribute('aria-pressed', DB.settings.activeRows.indexOf(v)>=0?'true':'false');
    saveDB(); refreshWarn();
  });
  document.getElementById('lenSeg').addEventListener('click', function(e){ var b=e.target.closest('.chip'); if(!b) return;
    var n=parseInt(b.getAttribute('data-len'),10); DB.settings.sessionLength=n; saveDB();
    this.querySelectorAll('.chip').forEach(function(c){ c.setAttribute('aria-pressed', parseInt(c.getAttribute('data-len'),10)===n?'true':'false'); });
  });
  document.getElementById('explSw').addEventListener('click', function(){ DB.settings.explainMode=!DB.settings.explainMode;
    this.setAttribute('aria-pressed', DB.settings.explainMode?'true':'false'); saveDB(); });
  document.getElementById('resetBtn').addEventListener('click', confirmReset);
  document.getElementById('closeBtn').addEventListener('click', function(){ document.getElementById('pov').remove(); render(); });
}

function confirmReset(){
  var html=''+
  '<div class="overlay" id="cov">'+
    '<div class="card" style="max-width:440px;">'+
      '<h2>Vymazat pokrok?</h2>'+
      '<div class="lead">Smaže se celá zahrada i historie učení. Nastavení zůstanou.</div>'+
      '<div class="rowbtns" style="margin-top:8px;">'+
        '<button class="btn2 ghost" id="cNo">Ne, zpět</button>'+
        '<button class="btn2 danger" id="cYes">Ano, vymazat</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  app.insertAdjacentHTML('beforeend', html);
  document.getElementById('cNo').addEventListener('click', function(){ document.getElementById('cov').remove(); });
  document.getElementById('cYes').addEventListener('click', function(){
    DB.garden={totalFlowers:0}; DB.facts={}; DB.words={};
    DB.rozstats={}; DB.rozRecent=[]; DB.spojRecent=[]; DB.lastSkladFam=null;
    DB.druhystats={}; DB.druhyRecent=[];
    DB.daily=clone(DEFAULTS.daily); DB.daily.date=todayStr(); DB.history=[];
    saveDB(); document.getElementById('cov').remove();
    var p=document.getElementById('pov'); if(p) p.remove();
    render();
  });
}

/* ---------------- boot ---------------- */
loadDB();
render();

})();
